<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>NEXOR · Dashboard · CFE 2026</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:rgba(217,119,6,0.15)}
:root{
  --bg:#FAFAFA;--bg2:#F0F0F0;--tx:#0D0D0D;--tx2:#555;--tx3:#888;
  --bd:rgba(0,0,0,0.10);--bd2:rgba(0,0,0,0.18);--card:#FFFFFF;
  --amber:#D97706;--amberBg:#FEF3C7;--amberTx:#92400E;
  --green:#16A34A;--greenBg:#F0FDF4;
  --red:#DC2626;--blue:#2563EB;
  --font:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
}
.dark{
  --bg:#0D0D0D;--bg2:#1A1A1A;--tx:#F0F0F0;--tx2:#888;--tx3:#555;
  --bd:rgba(255,255,255,0.08);--bd2:rgba(255,255,255,0.15);--card:#161616;
  --amber:#F59E0B;--amberBg:#1C1400;--amberTx:#FCD34D;
  --green:#22C55E;--greenBg:#052e16;
  --red:#EF4444;--blue:#3B82F6;
}
body{font-family:var(--font);background:var(--bg);color:var(--tx);min-height:100vh}
.topbar{padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:-webkit-sticky;position:sticky;top:0;background:#92400E;z-index:100}
.topbar-left{display:flex;align-items:center;gap:10px}
.back-btn,.icon-btn,.lang-btn,.sec-card,.dc,.na-btn,.sim-btn,.fc-btn,.tab-btn,.mode-btn{touch-action:manipulation;-webkit-appearance:none;font-family:var(--font);cursor:pointer;-webkit-tap-highlight-color:rgba(217,119,6,0.15)}
.back-btn{width:30px;height:30px;border:1.5px solid rgba(255,255,255,0.3);border-radius:6px;background:rgba(255,255,255,0.15);color:#FFF;font-size:16px;font-weight:600;display:flex;align-items:center;justify-content:center;border-style:solid}
.logo{font-size:15px;font-weight:600;letter-spacing:0.08em;color:#FFF}
.logo-dot{color:#FCD34D}
.cert-badge{font-size:11px;font-weight:600;padding:3px 8px;border-radius:5px;background:rgba(255,255,255,0.2);color:#FFF;letter-spacing:0.06em}
.topbar-right{display:flex;align-items:center;gap:5px}
.lang-toggle{display:flex;gap:3px}
.lang-btn{font-size:11px;font-weight:600;padding:5px 9px;border-radius:6px;background:rgba(255,255,255,0.15);color:#FFF;border:1.5px solid rgba(255,255,255,0.3)}
.lang-btn.active{background:#FFF;color:#92400E;border-color:#FFF}
.divider-v{width:0.5px;height:16px;background:rgba(255,255,255,0.3);margin:0 2px}
.icon-btn{width:30px;height:30px;border:1.5px solid rgba(255,255,255,0.3);border-radius:6px;background:rgba(255,255,255,0.15);color:#FFF;font-size:14px;display:flex;align-items:center;justify-content:center;border-style:solid}
.hero{padding:20px 16px 16px;border-bottom:0.5px solid var(--bd)}
.hero-label{font-size:10px;font-weight:600;letter-spacing:0.1em;color:var(--tx3);margin-bottom:4px}
.master-pct{font-size:28px;font-weight:700;color:var(--amber);margin-bottom:4px}
.master-sub{font-size:12px;color:var(--tx2);margin-bottom:14px}
.bar-track{height:8px;border-radius:4px;background:var(--bd2);overflow:hidden;display:flex;margin-bottom:4px}
.bar-red{height:100%;background:#DC2626;transition:width .5s}
.bar-amber{height:100%;background:#D97706;transition:width .5s}
.bar-green{height:100%;background:#16A34A;transition:width .5s}
.bar-labels{display:flex;justify-content:space-between;margin-bottom:14px}
.bar-lbl{font-size:10px;color:var(--tx3)}
.stats-row{display:flex;border:0.5px solid var(--bd);border-radius:10px;overflow:hidden}
.stat-item{flex:1;padding:12px 8px;text-align:center;border-right:0.5px solid var(--bd)}
.stat-item:last-child{border-right:none}
.stat-val{font-size:16px;font-weight:700;color:var(--tx)}
.stat-val.amber{color:var(--amber)}
.stat-lbl{font-size:9px;color:var(--tx3);letter-spacing:0.06em;margin-top:2px}
.sections-row{display:flex;gap:8px;padding:16px;border-bottom:0.5px solid var(--bd);overflow-x:auto;-webkit-overflow-scrolling:touch}
.sec-card{flex:1;min-width:140px;border:0.5px solid var(--bd);border-radius:10px;padding:12px;background:var(--card);text-align:left}
.sec-card.locked{opacity:.55;cursor:default;pointer-events:none}
.sec-label{font-size:9px;font-weight:700;letter-spacing:0.1em;color:var(--tx3);margin-bottom:4px}
.sec-name{font-size:12px;font-weight:600;color:var(--tx);margin-bottom:8px;line-height:1.3}
.sec-bar-track{height:3px;background:var(--bd2);border-radius:2px;overflow:hidden;margin-bottom:4px}
.sec-bar-fill{height:100%;background:var(--amber);border-radius:2px;transition:width .4s}
.sec-prog{font-size:10px;color:var(--tx2)}
.sec-lock-msg{font-size:10px;color:var(--tx3);margin-top:4px}
.next-action{margin:16px;border:1.5px solid var(--amber);border-radius:10px;padding:14px;background:var(--amberBg)}
.na-label{font-size:9px;font-weight:700;letter-spacing:0.1em;color:var(--amberTx);margin-bottom:6px}
.na-domain{font-size:13px;font-weight:600;color:var(--tx);margin-bottom:2px}
.na-reason{font-size:12px;color:var(--tx2);margin-bottom:10px}
.na-btn{padding:8px 16px;background:#92400E;color:#FFF;border:none;border-radius:6px;font-size:12px;font-weight:600}
.legend{display:flex;flex-wrap:wrap;gap:10px;padding:12px 16px;background:var(--bg2);border-bottom:0.5px solid var(--bd)}
.legend-item{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--tx2)}
.leg-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.sec-group{padding:0 16px 16px}
.sec-header{display:flex;align-items:center;justify-content:space-between;padding:14px 0 10px}
.sec-title{font-size:11px;font-weight:700;letter-spacing:0.1em;color:var(--tx3)}
.sec-count{font-size:11px;color:var(--tx2)}
.domain-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
@media(min-width:480px){.domain-grid{grid-template-columns:repeat(5,1fr)}}
@media(min-width:680px){.domain-grid{grid-template-columns:repeat(6,1fr)}}
.dc{border:0.5px solid var(--bd);border-radius:8px;padding:8px 6px;background:var(--card);text-align:center;width:100%}
.dc:active{opacity:.8}
.dc.locked{opacity:.4;cursor:default;pointer-events:none}
.dc.earned{border-color:var(--amber);background:var(--amberBg)}
.dc.passed{border-color:var(--green)}
.dc.progress{border-color:var(--amber)}
.dc.critical{border-color:var(--red)}
.dc-code{font-size:9px;font-weight:700;color:var(--tx3);letter-spacing:0.05em;margin-bottom:3px}
.dc-dot{width:8px;height:8px;border-radius:50%;margin:0 auto 3px}
.dc-dot.earned{background:var(--amber)}
.dc-dot.passed{background:var(--green)}
.dc-dot.progress{background:var(--amber);opacity:.6}
.dc-dot.critical{background:var(--red)}
.dc-dot.started{background:var(--blue)}
.dc-dot.untouched{background:var(--bd2)}
.dc-dot.locked{background:var(--bd2)}
.dc-score{font-size:10px;font-weight:600;color:var(--tx2)}
.dc-score.green{color:var(--green)}
.dc-score.amber{color:var(--amber)}
.dc-score.red{color:var(--red)}
.badges-section{padding:16px;border-top:0.5px solid var(--bd)}
.badges-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.badges-title{font-size:11px;font-weight:700;letter-spacing:0.1em;color:var(--tx3)}
.badges-count{font-size:11px;color:var(--tx2)}
.badges-grid{display:flex;flex-wrap:wrap;gap:6px}
.badge-img-wrap{position:relative;width:56px;flex-shrink:0}
.badge-img-wrap img{width:56px;height:56px;object-fit:contain;border-radius:8px;display:block;filter:grayscale(1) brightness(0.35);transition:filter 0.3s}
.badge-img-wrap.earned img{filter:none;drop-shadow(0 0 6px rgba(217,119,6,0.6))}
.badge-img-wrap.earned::after{content:'';position:absolute;inset:0;border-radius:8px;box-shadow:0 0 10px 2px rgba(217,119,6,0.35)}
.badge-label{font-size:8px;font-weight:700;text-align:center;margin-top:3px;letter-spacing:0.04em;color:var(--tx3);font-family:var(--font)}
.badge-item{display:flex;flex-direction:column;align-items:center;gap:0}
.badges-grid{display:flex;flex-wrap:wrap;gap:10px}
.badges-section-title{font-size:9px;font-weight:700;letter-spacing:0.12em;color:var(--tx3);margin:10px 0 6px;text-transform:uppercase}
.badge-group{margin-bottom:4px}
.badge-special{margin-top:8px;padding-top:8px;border-top:0.5px solid var(--bd)}
.sim-wrap{background:#92400E;padding:20px 16px;text-align:center}
.sim-label{font-size:9px;font-weight:700;letter-spacing:0.1em;color:rgba(255,255,255,0.6);margin-bottom:4px}
.sim-title{font-size:15px;font-weight:700;color:#FFF;margin-bottom:4px}
.sim-sub{font-size:11px;color:rgba(255,255,255,0.7);margin-bottom:12px}
.sim-btn{padding:10px 24px;background:#FFF;color:#92400E;border:none;border-radius:7px;font-size:13px;font-weight:700}
.sim-btn.locked{background:rgba(255,255,255,0.2);color:rgba(255,255,255,0.5);cursor:default;pointer-events:none}
.sim-lock{font-size:11px;color:rgba(255,255,255,0.6);margin-top:8px}
@media(max-width:480px){.master-pct{font-size:24px}.stat-val{font-size:14px}}
</style>
</head>

<div id="app">
<div class="topbar">
  <div class="topbar-left">
    <button class="back-btn" id="btn-back">&#8592;</button>
    <div class="logo">NEXOR<span class="logo-dot">_</span></div>
    <div class="cert-badge">CFE 2026</div>
  </div>
  <div class="topbar-right">
    <div class="lang-toggle">
      <button class="lang-btn active" id="btn-pt">PT</button>
      <button class="lang-btn" id="btn-en">EN</button>
      <button class="lang-btn" id="btn-es">ES</button>
    </div>
    <div class="divider-v"></div>
    <button class="icon-btn" id="btn-theme">&#127769;</button>
  </div>
</div>

<div class="hero">
  <div class="hero-label" id="h-label">CFE 2026</div>
  <div class="master-pct" id="h-pct">0%</div>

  <div class="bar-track">

    <div class="bar-green" id="bar-green" style="width:0%"></div>
  </div>
  <div class="bar-labels">
    <div class="bar-lbl" id="l-risk"></div>
    <div class="bar-lbl" id="l-attn"></div>
    <div class="bar-lbl" id="l-ok"></div>
  </div>
  <div class="stats-row">
    <div class="stat-item"><div class="stat-val amber" id="st-best">&#8212;</div><div class="stat-lbl" id="l-best">SCORE</div></div>
    <div class="stat-item"><div class="stat-val" id="st-done">0/45</div><div class="stat-lbl" id="l-done">DONE</div></div>

  </div>
</div>

<div class="sections-row" id="sections-row"></div>
<div id="next-action"></div>
<div class="legend">
  <div class="legend-item"><div class="leg-dot" style="background:var(--amber)"></div><span id="leg-earned"></span></div>
  <div class="legend-item"><div class="leg-dot" style="background:var(--green)"></div><span id="leg-passed"></span></div>
  <div class="legend-item"><div class="leg-dot" style="background:var(--amber);opacity:.6"></div><span id="leg-prog"></span></div>
  <div class="legend-item"><div class="leg-dot" style="background:var(--red)"></div><span id="leg-crit"></span></div>
  <div class="legend-item"><div class="leg-dot" style="background:var(--bd2)"></div><span id="leg-new"></span></div>
</div>
<div id="domain-sections"></div>
<div class="badges-section">
  <div class="badges-hdr">
    <div class="badges-title" id="badges-title">BADGES</div>
    <div class="badges-count" id="badges-count">0/49</div>
  </div>
  <div class="badges-grid" id="badges-grid"></div>
</div>
<div class="sim-wrap">
  <div class="sim-label" id="sim-label">FINAL</div>
  <div class="sim-title" id="sim-title">CFE Simulation</div>
  <div class="sim-sub" id="sim-sub">310 questions</div>
  <button class="sim-btn locked" id="sim-btn">Locked</button>
  <div class="sim-lock" id="sim-lock"></div>
</div>
</div>

function tr(k, v) {
  var s = (TX[lang] || TX.en)[k] || k;
  if (v) Object.keys(v).forEach(function(x){ s = s.replace('{' + x + '}', v[x]); });
  return s;
}
function g(id){ return document.getElementById(id); }
function st(id, val){ var e = g(id); if (e) e.textContent = val; }

function getDomainData(key) {
  var h1    = JSON.parse(localStorage.getItem('nx_cfe_' + key + '_h1')  || '[]');
  var fcd   = JSON.parse(localStorage.getItem('nx_cfe_' + key + '_fcd') || '[]');
  var badge = localStorage.getItem('nx_cfe_' + key + '_badge') === 'true';
  var best  = h1.length ? Math.max.apply(null, h1.map(function(h){ return h.s; })) : 0;
  var att   = h1.length;
  var status;
  if (badge || best >= 80) status = 'earned';
  else if (best >= 70)     status = 'passed';
  else if (best >= 60)     status = 'progress';
  else if (best > 0)       status = 'critical';
  else if (att > 0)        status = 'started';
  else                     status = 'untouched';
  return { best: best, att: att, fcd: fcd.length, badge: badge, status: status };
}

function secUnlocked(sec, allData) {
  if (sec === 1) return true;
  var prev = DOMAINS.filter(function(d){ return d.section === sec - 1; });
  var need = sec === 2 ? 12 : 10;
  var ok = prev.filter(function(d){ return allData[d.key].best >= 70; }).length;
  return ok >= need;
}

function applyTheme() {
  document.body.classList.toggle('dark', dark);
  g('btn-theme').innerHTML = dark ? '&#9728;' : '&#127769;';
}

function applyLangBtns() {
  ['pt','en','es'].forEach(function(l) {
    var btn = g('btn-' + l);
    if (btn) btn.classList.toggle('active', l === lang);
  });
}

function render() {
  var allData = {};
  DOMAINS.forEach(function(d){ allData[d.key] = getDomainData(d.key); });

  st('h-label', tr('hl'));
  st('l-risk', tr('lrisk')); st('l-attn', tr('lattn')); st('l-ok', tr('lok'));
  st('l-best', tr('lbest')); st('l-done', tr('ldone'));
  st('l-badges', tr('lbadges')); st('l-att', tr('latt'));
  st('leg-earned', tr('leEarned')); st('leg-passed', tr('lePassed'));
  st('leg-prog', tr('leProg')); st('leg-crit', tr('leCrit')); st('leg-new', tr('leNew'));
  st('badges-title', tr('bdgtitle'));
  st('sim-label', tr('simlabel')); st('sim-title', tr('simtitle')); st('sim-sub', tr('simsub'));

  var scores = [], totalDone = 0, totalBadges = 0, totalAtt = 0;
  DOMAINS.forEach(function(d) {
    var data = allData[d.key];
    if (data.best > 0) scores.push(data.best);
    if (data.best >= 70) totalDone++;
    if (data.status === 'earned') totalBadges++;
    totalAtt += data.att;
  });
  var avg = scores.length ? Math.round(scores.reduce(function(a,b){return a+b;},0) / scores.length) : 0;

  st('h-pct', avg > 0 ? avg + '%' : '0%');
  st('h-sub', tr('hsub', {d: totalDone}));
  st('st-best', avg > 0 ? avg + '%' : '—');
  st('st-done', totalDone + '/45');
  st('st-badges', totalBadges + '/49');
  st('st-att', totalAtt);
  st('badges-count', totalBadges + '/49');

  var tot = DOMAINS.length, pR = 0, pA = 0, pG = 0;
  DOMAINS.forEach(function(d) {
    var b = allData[d.key].best;
    if (b >= 80) pG++; else if (b >= 60) pA++; else if (b > 0) pR++;
  });
  g('bar-red').style.width   = (pR / tot * 100) + '%';
  g('bar-amber').style.width = (pA / tot * 100) + '%';
  g('bar-green').style.width = (pG / tot * 100) + '%';

  var secNames  = [tr('sn1'), tr('sn2'), tr('sn3')];
  var secLabels = [tr('s1'), tr('s2'), tr('s3')];
  var secDoms   = [1,2,3].map(function(s){
    return DOMAINS.filter(function(d){ return d.section === s; });
  });

  var secHtml = '';
  for (var s = 1; s <= 3; s++) {
    var doms = secDoms[s-1], unl = secUnlocked(s, allData);
    var passed = doms.filter(function(d){ return allData[d.key].best >= 70; }).length;
    var pct = Math.round(passed / doms.length * 100);
    secHtml += '<button class="sec-card' + (unl ? '' : ' locked') + '" data-sec="' + s + '">';
    secHtml += '<div class="sec-label">' + secLabels[s-1] + '</div>';
    secHtml += '<div class="sec-name">' + secNames[s-1] + '</div>';
    if (unl) {
      secHtml += '<div class="sec-bar-track"><div class="sec-bar-fill" style="width:' + pct + '%"></div></div>';
      secHtml += '<div class="sec-prog">' + tr('sprog', {d: passed, t: doms.length}) + '</div>';
    } else {
      secHtml += '<div class="sec-lock-msg">' + tr('slock', {n: s-1}) + '</div>';
    }
    secHtml += '</button>';
  }
  g('sections-row').innerHTML = secHtml;

  // Eventos nos section cards
  document.querySelectorAll('.sec-card').forEach(function(btn) {
    btn.onclick = function() {
      var sec = parseInt(btn.getAttribute('data-sec'));
      var el = g('sg' + sec);
      if (el) el.scrollIntoView({behavior: 'smooth'});
    };
  });

  // Next action
  var next = null, reason = '';
  var withScore = DOMAINS.filter(function(d){
    return allData[d.key].best > 0 && allData[d.key].best < 70 && secUnlocked(d.section, allData);
  });
  withScore.sort(function(a,b){ return allData[a.key].best - allData[b.key].best; });
  if (withScore.length > 0) {
    next = withScore[0];
    reason = tr('nalow') + ' ' + allData[next.key].best + '%';
  } else {
    var notStarted = DOMAINS.filter(function(d){
      return allData[d.key].att === 0 && secUnlocked(d.section, allData);
    });
    if (notStarted.length > 0) { next = notStarted[0]; reason = tr('nanew'); }
  }
  var naHtml = '';
  if (next) {
    naHtml = '<div class="next-action">';
    naHtml += '<div class="na-label">' + tr('nalabel') + '</div>';
    naHtml += '<div class="na-domain">' + next.code + ' &middot; ' + next.name + '</div>';
    naHtml += '<div class="na-reason">' + reason + '</div>';
    naHtml += '<button class="na-btn" data-key="' + next.key + '">' + tr('nabtn') + '</button>';
    naHtml += '</div>';
  }
  g('next-action').innerHTML = naHtml;
  var naBtn = document.querySelector('.na-btn');
  if (naBtn) {
    naBtn.onclick = function() {
      window.location.href = '../cfe/' + naBtn.getAttribute('data-key') + '/index.html';
    };
  }

  // Domain grid
  var dsHtml = '';
  for (var s = 1; s <= 3; s++) {
    var doms = secDoms[s-1], unl = secUnlocked(s, allData);
    var passed = doms.filter(function(d){ return allData[d.key].best >= 70; }).length;
    dsHtml += '<div class="sec-group" id="sg' + s + '">';
    dsHtml += '<div class="sec-header">';
    dsHtml += '<div class="sec-title">' + secLabels[s-1] + ' &middot; ' + secNames[s-1].toUpperCase() + '</div>';
    dsHtml += '<div class="sec-count">' + passed + '/' + doms.length + '</div>';
    dsHtml += '</div><div class="domain-grid">';
    doms.forEach(function(d) {
      var data = allData[d.key];
      var st2  = unl ? data.status : 'locked';
      var dotCls = st2;
      var scStr  = data.best > 0 ? data.best + '%' : '—';
      var scCls  = data.best >= 80 ? 'amber' : data.best >= 70 ? 'green' : data.best > 0 ? 'red' : '';
      dsHtml += '<button class="dc ' + st2 + '" data-key="' + d.key + '" data-unlocked="' + (unl ? '1' : '0') + '">';
      dsHtml += '<div class="dc-code">' + d.code + '</div>';
      dsHtml += '<div class="dc-dot ' + dotCls + '"></div>';
      dsHtml += '<div class="dc-score ' + scCls + '">' + scStr + '</div>';
      dsHtml += '</button>';
    });
    dsHtml += '</div></div>';
  }
  g('domain-sections').innerHTML = dsHtml;

  // Eventos nos domain cards
  document.querySelectorAll('.dc').forEach(function(btn) {
    btn.onclick = function() {
      if (btn.getAttribute('data-unlocked') === '1') {
        window.location.href = '../cfe/' + btn.getAttribute('data-key') + '/index.html';
      }
    };
  });

  // Badges visuais
  var s1all = DOMAINS.filter(function(d){return d.section===1&&allData[d.key].status==='earned';}).length === 20;
  var s2all = DOMAINS.filter(function(d){return d.section===2&&allData[d.key].status==='earned';}).length === 16;
  var s3all = DOMAINS.filter(function(d){return d.section===3&&allData[d.key].status==='earned';}).length === 9;
  var premAll = s1all && s2all && s3all;

  function badgeFile(code, section) {
    var num = code.replace(/[A-Z]+/g,'').replace('D','').padStart(2,'0');
    if (section === 1) return 'CFE_SID' + num + '.png';
    if (section === 2) return 'CFE_S2D' + num + '.png';
    if (section === 3) return 'CFE_S3D' + num + '.png';
    return '';
  }
  function badgeItem(file, label, earned) {
    return '<div class="badge-item"><div class="badge-img-wrap' + (earned?' earned':'') + '">' +
      '<img src="static/badges/cfe/' + file + '" alt="' + label + '" loading="lazy">' +
      '</div><div class="badge-label">' + label + '</div></div>';
  }

  var bgHtml = '';
  bgHtml += '<div class="badge-group" style="width:100%"><div class="badges-section-title">Seção 1 · Financial Transactions</div><div style="display:flex;flex-wrap:wrap;gap:10px">';
  DOMAINS.filter(function(d){return d.section===1;}).forEach(function(d){
    bgHtml += badgeItem(badgeFile(d.code,1), d.code, allData[d.key].status==='earned');
  });
  bgHtml += '</div></div>';

  bgHtml += '<div class="badge-group" style="width:100%"><div class="badges-section-title">Seção 2 · Investigation</div><div style="display:flex;flex-wrap:wrap;gap:10px">';
  DOMAINS.filter(function(d){return d.section===2;}).forEach(function(d){
    bgHtml += badgeItem(badgeFile(d.code,2), d.code, allData[d.key].status==='earned');
  });
  bgHtml += '</div></div>';

  bgHtml += '<div class="badge-group" style="width:100%"><div class="badges-section-title">Seção 3 · Prevention & Deterrence</div><div style="display:flex;flex-wrap:wrap;gap:10px">';
  DOMAINS.filter(function(d){return d.section===3;}).forEach(function(d){
    bgHtml += badgeItem(badgeFile(d.code,3), d.code, allData[d.key].status==='earned');
  });
  bgHtml += '</div></div>';

  bgHtml += '<div class="badge-special" style="display:flex;flex-wrap:wrap;gap:10px;width:100%;margin-top:8px;padding-top:8px;border-top:0.5px solid var(--bd)">';
  bgHtml += badgeItem('CFE_S01.png', 'S1 MASTER', s1all);
  bgHtml += badgeItem('CFE_S02.png', 'S2 MASTER', s2all);
  bgHtml += badgeItem('CFE_S03.png', 'S3 MASTER', s3all);
  bgHtml += badgeItem('CFE_PREMIUM.png', 'CFE PREMIUM', premAll);
  bgHtml += '</div>';

  g('badges-grid').innerHTML = bgHtml;

  // Simulado
  var simUnl = secUnlocked(2, allData) && secUnlocked(3, allData) && totalDone >= 40;
  var sb = g('sim-btn');
  sb.textContent = simUnl ? tr('simunlocked') : tr('simlocked');
  sb.className = 'sim-btn' + (simUnl ? '' : ' locked');
  st('sim-lock', simUnl ? '' : tr('simlock'));
}

// Eventos fixos (botoes estaticos no HTML)
g('btn-back').onclick  = function() { window.location.href = '../index.html'; };
g('btn-theme').onclick = function() { dark = !dark; localStorage.setItem('nx_dark', dark ? '1' : '0'); applyTheme(); };
g('btn-pt').onclick    = function() { lang = 'pt'; localStorage.setItem('nx_lang', 'pt'); applyLangBtns(); render(); };
g('btn-en').onclick    = function() { lang = 'en'; localStorage.setItem('nx_lang', 'en'); applyLangBtns(); render(); };
g('btn-es').onclick    = function() { lang = 'es'; localStorage.setItem('nx_lang', 'es'); applyLangBtns(); render(); };

window.addEventListener('load', function() {
  applyTheme();
  applyLangBtns();
  render();
});
</script>
</body>
</html>
