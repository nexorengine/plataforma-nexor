<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="assets/icon-180.png">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="nexor_med">
<meta name="theme-color" content="#16263B">
<title>nexor_med · Domínios</title>
<link rel="stylesheet" href="assets/nx.css">
<link rel="stylesheet" href="assets/nx-glass.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/auth.js"></script>
<style>
.hero-reveal{opacity:0;transform:translateY(20px);filter:blur(6px);transition:opacity 700ms cubic-bezier(0.16,1,0.3,1),transform 700ms cubic-bezier(0.16,1,0.3,1),filter 700ms cubic-bezier(0.16,1,0.3,1);}
.hero-reveal.visible{opacity:1;transform:translateY(0);filter:blur(0);}
.sr{opacity:0;transform:translateY(15px);transition:opacity 600ms cubic-bezier(0.16,1,0.3,1),transform 600ms cubic-bezier(0.16,1,0.3,1);}
.sr.visible{opacity:1;transform:translateY(0);}
.nx-domain-row{transition:transform 250ms cubic-bezier(0.16,1,0.3,1),box-shadow 250ms ease,background 200ms ease;}
.nx-domain-row:hover{transform:translateX(4px);background:rgba(14,165,233,0.06)!important;}
@media(prefers-reduced-motion:reduce){.hero-reveal,.sr{opacity:1!important;transform:none!important;filter:none!important;}}
</style>
</head>
<body>
<div class="nx-header">
  <a href="c1-med" class="nx-back-btn"><i class="ti ti-arrow-left"></i>voltar</a>
  <div class="nx-wordmark">nexor_<span>med</span></div>
  <button class="nx-bell-btn" id="nx-bell-btn" onclick="toggleNotif()"><i class="ti ti-bell"></i></button>
  <a href="#" class="nx-avatar-btn" onclick="toggleProfile();return false;">AA</a>
</div>
<div class="nx-scroll">
<div class="nx-body">
  <div id="area-header" class="hero-reveal" style="transition-delay:0ms"></div>
  <div class="nx-section-header">
    <div class="nx-section-title hero-reveal" id="sec-title" style="transition-delay:80ms">Domínios</div>
    <div class="nx-section-meta-txt hero-reveal" id="sec-meta" style="transition-delay:160ms"></div>
  </div>
  <div id="lista-dominios"></div>
</div>
</div>
<div class="nx-footer"><span>nexor_med · Residência Médica · Powered by FractalLearning™</span></div>
<script src="assets/notif.js"></script>
<script src="assets/profile.js"></script>
<script src="assets/catalog.js"></script>
<script>
// Protege a rota — redireciona para login se não autenticado
(async () => {
  const s = await Auth.requireAuth();
  if (!s) return;
  await Auth.fillHeader();
})();
</script>
<script>
const hash = Object.fromEntries(window.location.hash.replace('#','').split('&').map(p=>p.split('=')));
const areaSlug = hash.area || new URLSearchParams(window.location.search).get('area') || 'cirurgia_geral';
const area = CATALOG[areaSlug];

if (!area) {
  document.getElementById('area-header').innerHTML = '<p style="color:#ef4444;padding:20px;">Especialidade não encontrada.</p>';
} else {
  document.title = area.label + ' · nexor_med';
  const n = area.dominios.length;

  document.getElementById('area-header').innerHTML = `
    <div style="display:flex;align-items:center;gap:14px;margin-bottom:20px;">
      <div class="nx-icon-slot" style="width:52px;height:52px;flex-shrink:0;"><i class="ti ${area.icon}" style="font-size:24px;"></i></div>
      <div>
        <div style="font-size:10px;font-family:'Barlow',sans-serif;font-weight:300;color:#0EA5E9;letter-spacing:0.08em;text-transform:uppercase;margin-bottom:3px;">nexor_med · Especialidade</div>
        <div style="font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:20px;color:#F0F6FB;line-height:1.1;">${area.label}</div>
        <div style="font-size:12px;color:#B0BEC5;font-weight:300;margin-top:2px;">${n} domínios · ${n*48} flashcards · ${n*100} questões</div>
      </div>
    </div>
    <div style="display:flex;justify-content:space-between;margin-bottom:16px;background:#16263B;border:1px solid #1d3452;border-radius:6px;padding:10px 14px;">
      <div style="display:flex;align-items:center;gap:5px;font-size:10px;color:#B0BEC5;font-weight:300;"><i class="ti ti-circle-check" style="color:#4ade80;font-size:14px;"></i>satisfatório ≥80%</div>
      <div style="display:flex;align-items:center;gap:5px;font-size:10px;color:#B0BEC5;font-weight:300;"><i class="ti ti-circle-check" style="color:#FCA311;font-size:14px;"></i>mediano 50-79%</div>
      <div style="display:flex;align-items:center;gap:5px;font-size:10px;color:#B0BEC5;font-weight:300;"><i class="ti ti-ban" style="color:#ef4444;font-size:14px;"></i>insuficiente</div>
    </div>`;

  document.getElementById('sec-title').textContent = 'Domínios · ' + area.label;
  document.getElementById('sec-meta').textContent = n + ' domínios';

  document.getElementById('lista-dominios').innerHTML = area.dominios.map((d, i) => `
    <a href="c3-med#area=${areaSlug}&dominio=${d.slug}" class="nx-domain-row sr" data-slug="${d.slug}" style="transition-delay:${i*50}ms">
      <div class="nx-dot"></div>
      <span class="nx-domain-code-txt">${d.code}</span>
      <span class="nx-domain-name-txt">${d.nome}</span>
      <span class="nx-domain-score" style="color:#9CA3AF;">—</span>
      <div class="nx-status-icon"><i class="ti ti-circle-dashed" style="color:#9CA3AF;font-size:16px;"></i></div>
    </a>`).join('');

  // Carrega badges de progresso do Supabase
  (async () => {
    try {
      const {data:{session}} = await _sb.auth.getSession();
      if (!session) return;
      const {data:sessions} = await _sb.from('study_sessions')
        .select('dominio,tipo,score')
        .eq('user_id', session.user.id)
        .eq('area', areaSlug);
      if (!sessions || sessions.length === 0) return;
      area.dominios.forEach(d => {
        const ds = sessions.filter(s => s.dominio === d.slug);
        if (!ds.length) return;
        const row = document.querySelector(`.nx-domain-row[data-slug="${d.slug}"]`);
        if (!row) return;
        const dotEl  = row.querySelector('.nx-dot');
        const scoreEl = row.querySelector('.nx-domain-score');
        const iconEl  = row.querySelector('.nx-status-icon');
        const quizS = ds.filter(s => s.tipo === 'quiz');
        const fcS   = ds.filter(s => s.tipo === 'flashcard');
        if (quizS.length > 0) {
          const best = Math.max(...quizS.map(s => parseFloat(s.score) || 0));
          const cor  = best >= 80 ? '#4ade80' : best >= 50 ? '#FCA311' : '#ef4444';
          const ico  = best >= 80 ? 'ti-circle-check' : best >= 50 ? 'ti-circle-half-2' : 'ti-circle-x';
          dotEl.style.background = cor;
          scoreEl.textContent = best + '%';
          scoreEl.style.color = cor;
          iconEl.innerHTML = `<i class="ti ${ico}" style="color:${cor};font-size:16px;"></i>`;
        } else if (fcS.length > 0) {
          dotEl.style.background = '#0EA5E9';
          dotEl.style.opacity = '0.5';
          scoreEl.textContent = 'FC';
          scoreEl.style.color = '#0EA5E9';
          iconEl.innerHTML = `<i class="ti ti-cards" style="color:#0EA5E9;opacity:0.6;font-size:16px;"></i>`;
        }
      });
    } catch(e) { console.warn('Erro ao carregar progresso C2:', e); }
  })();

  (function(){
    const scrollEl = document.querySelector('.nx-scroll');
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        document.querySelectorAll('.hero-reveal').forEach(el => el.classList.add('visible'));
      });
    });
    const io = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) { entry.target.classList.add('visible'); io.unobserve(entry.target); }
      });
    }, { root: scrollEl, threshold: 0.08 });
    document.querySelectorAll('.sr').forEach(el => io.observe(el));
  })();
}
</script>
<script>if("serviceWorker"in navigator)navigator.serviceWorker.register("sw.js");</script>
</body>
</html>
