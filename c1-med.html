<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta name="theme-color" content="#16263B">
<title>nexor_med · Especialidades</title>
<link rel="stylesheet" href="assets/nx.css">
</head>
<body>
<div class="nx-header">
  <a href="index" class="nx-back-btn"><i class="ti ti-arrow-left"></i>início</a>
  <div class="nx-wordmark">nexor_<span>med</span></div>
  <button class="nx-bell-btn" id="nx-bell-btn" onclick="toggleNotif()"><i class="ti ti-bell"></i></button>
  <a href="#" class="nx-avatar-btn" onclick="toggleProfile();return false;">AA</a>
</div>
<div class="nx-scroll">
<div class="nx-body">
  <div class="nx-hero">
    <div class="nx-hero-tag">Residência Médica · 5 especialidades</div>
    <div class="nx-hero-title">Suas especialidades</div>
    <div class="nx-hero-sub">Selecione uma especialidade para estudar.</div>
  </div>
  <div id="lista-areas"></div>
</div>
</div>
<div class="nx-footer"><span>nexor_med · Residência Médica · Powered by FractalLearning™</span></div>
<script src="assets/notif.js"></script>
<script src="assets/profile.js"></script>
<script src="assets/catalog.js"></script>
<script>
const el = document.getElementById('lista-areas');
el.innerHTML = AREA_ORDER.map(slug => {
  const a = CATALOG[slug];
  const n = a.dominios.length;
  return `<a href="c2-med#area=${slug}" class="nx-capsule active">
    <div class="nx-icon-slot"><i class="ti ${a.icon}"></i></div>
    <div class="nx-cap-body">
      <div class="nx-cap-title">${a.label}</div>
      <div class="nx-cap-org">${n} domínios · ${n*48} flashcards · ${n*100} questões</div>
    </div>
    <div class="nx-pill available">ACESSAR</div>
  </a>`;
}).join('');
</script>
</body>
</html>
