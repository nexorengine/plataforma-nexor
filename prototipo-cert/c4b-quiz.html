<div class="nx-body">

    <div class="nx-icon-slot-text" style="width:40px;height:40px;font-size:12px;flex-shrink:0;">CFE</div>

      <div style="font-size:10px;font-family:'Barlow',sans-serif;font-weight:300;color:#A9927D;margin-bottom:2px;">CFE · S1 · SD06</div>
      <div style="font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:15px;color:#F2F4F3;line-height:1.1;">Corruption, Bribery & COI</div>

  <!-- BOTTOM SHEET: MINI-AULA -->

  <div id="nx-aula-sheet" class="nx-aula-sheet">

    <div style="display:flex;align-items:center;justify-content:space-between;padding:16px 20px 12px;border-bottom:1px solid #5E503F;">
      <div style="display:flex;align-items:center;gap:8px;">

      <div style="font-size:12px;color:#7a6a64;font-family:'Barlow',sans-serif;font-weight:300;line-height:1.5;" id="aula-fonte"></div>
    </div>
    <div style="height:16px;"></div>
  </div>

  <div class="nx-stats-row">
    <div class="nx-stat"><div class="nx-stat-val" id="sr" style="color:#4ade80;">0</div><div class="nx-stat-lbl">acertos</div></div>
    <div class="nx-stat"><div class="nx-stat-val" id="sw" style="color:#f87171;">0</div><div class="nx-stat-lbl">erros</div></div>
    <div class="nx-stat"><div class="nx-stat-val" id="sp" style="color:#A9927D;">—</div><div class="nx-stat-lbl">aproveitamento</div></div>

<script src="assets/tts.js"></script>
<script>
const params=new URLSearchParams(window.location.search);
const qn=params.get('n')||'1';
document.getElementById('quiz-sub').textContent='Quiz 00'+qn+' · 50 questões';

const questions=[
  {q:"Qual é a definição de suborno (bribery) segundo o CFE?",opts:["Desvio de ativos da empresa para uso pessoal","Oferta ou recebimento de algo de valor para influenciar uma ação ou decisão","Manipulação de demonstrações financeiras","Acesso não autorizado a sistemas de informação"],c:1,exp:"Suborno é a oferta, pagamento, solicitação ou recebimento de qualquer coisa de valor com o propósito de influenciar uma ação, decisão ou julgamento de quem está em posição de confiança."},
  {q:"O que diferencia kickback de bid rigging?",opts:["Kickback envolve licitações; bid rigging envolve reembolsos","Kickback é devolução de parte do pagamento ao aprovador; bid rigging é conluio em licitações","Ambos são sinônimos no contexto do CFE","Kickback é crime federal; bid rigging é infração civil"],c:1,exp:"Kickback: o fornecedor devolve parte do valor recebido ao funcionário que aprovou o contrato. Bid rigging: fornecedores combinam entre si para manipular o resultado de uma licitação."},
  {q:"Quais são os três elementos que configuram um Conflito de Interesses (COI)?",opts:["Interesse pessoal, omissão dolosa e dano patrimonial","Interesse pessoal, relação com decisão profissional e ausência de divulgação","Interesse financeiro, cargo de gestão e benefício a terceiro","Vínculo familiar, poder de decisão e valor superior a R$ 10.000"],c:1,exp:"Para configurar COI são necessários: (1) interesse pessoal do funcionário, (2) que esse interesse se relacione com uma decisão profissional e (3) que não haja divulgação adequada à organização."},
  {q:"O FCPA (Foreign Corrupt Practices Act) proíbe principalmente:",opts:["Suborno entre empresas privadas nos EUA","Suborno de funcionários públicos estrangeiros por empresas com nexo nos EUA","Fraude em demonstrações financeiras de empresas abertas","Lavagem de dinheiro por instituições financeiras"],c:1,exp:"O FCPA proíbe que empresas americanas ou com nexo nos EUA paguem subornos a funcionários públicos estrangeiros para obter ou manter negócios. Também exige controles contábeis adequados."},
  {q:"Qual red flag sugere um esquema de suborno em procurement?",opts:["Funcionário solicita férias longas","Fornecedor único aprovado sem análise competitiva e preço acima do mercado","Alta rotatividade de pessoal no departamento de RH","Aumento repentino nas vendas para novos clientes"],c:1,exp:"Fornecedor único sem justificativa técnica e preço inflacionado são red flags clássicos de suborno em compras. Outros sinais: funcionário com padrão de vida incompatível com salário, aprovações rápidas sem due diligence."},
];

function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function shuffleQ(q){const idx=q.opts.map((o,i)=>({t:o,i}));shuffle(idx);return{q:q.q,opts:idx.map(x=>x.t),c:idx.findIndex(x=>x.i===q.c),exp:q.exp};}
shuffle(questions);
const sq=questions.map(shuffleQ);
let cur=0,sel=-1,confirmed=false,rights=0,wrongs=0;
const TOTAL=50,keys=['A','B','C','D'];

/* TIMER */
const TIMER_TOTAL=60*60;
let timerSec=TIMER_TOTAL,timerInterval=null,quizEnded=false;
function startTimer(){
  timerInterval=setInterval(()=>{timerSec--;updateTimerDisplay();if(timerSec<=0){clearInterval(timerInterval);timeUp();}},1000);
}
function updateTimerDisplay(){
  const el=document.getElementById('timer-display');
  const m=Math.floor(timerSec/60),s=timerSec%60;
  el.textContent=String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
  if(timerSec<=180){el.style.color='#ef4444';el.style.animation='nx-pulse 1s ease-in-out infinite';}
  else{el.style.color='#A9927D';el.style.animation='';}
}
function stopTimer(){clearInterval(timerInterval);timerInterval=null;}
function timeUp(){
  if(quizEnded)return;quizEnded=true;
  TTS.stop&&TTS.stop();
  document.getElementById('q-label').textContent='tempo esgotado';
  document.getElementById('q-text').textContent='O tempo da prova encerrou. Acertos: '+rights+' · Erros: '+wrongs;
  document.getElementById('options').innerHTML='';
  document.getElementById('btn-confirm').className='nx-btn-primary hidden';
  document.getElementById('btn-next').className='nx-btn-next hidden';
  document.getElementById('feedback').className='nx-feedback wrong';
  document.getElementById('fb-label').textContent='TEMPO ESGOTADO';
  document.getElementById('fb-text').textContent='Você respondeu '+(rights+wrongs)+' de '+TOTAL+' questões.';
  document.getElementById('timer-display').textContent='00:00';
  document.getElementById('timer-display').style.color='#ef4444';
}
document.getElementById('btn-back').addEventListener('click',()=>{stopTimer();});

/* QUIZ */
function render(){
  sel=-1;confirmed=false;
  const q=sq[cur];
  document.getElementById('q-label').textContent='questão '+String(cur+1).padStart(2,'0');
  document.getElementById('q-text').textContent=q.q;
  const opts=document.getElementById('options');
  opts.innerHTML='';
  q.opts.forEach((o,i)=>{
    const d=document.createElement('div');
    d.className='nx-option';
    d.innerHTML=`<span class="nx-opt-key">${keys[i]}</span><span class="nx-opt-text">${o}</span>`;
    d.onclick=()=>selectOpt(i);
    opts.appendChild(d);
  });
  document.getElementById('btn-confirm').disabled=true;
  document.getElementById('btn-confirm').className='nx-btn-primary';
  document.getElementById('feedback').className='nx-feedback';
  document.getElementById('btn-next').className='nx-btn-next hidden';
  document.getElementById('btn-aula').className='nx-btn-aula hidden';
  closeAula();
  document.getElementById('prog-fill').style.width=Math.max(2,Math.round(cur/TOTAL*100))+'%';
  document.getElementById('prog-count').textContent=(cur+1)+' / '+TOTAL;
}
function selectOpt(i){
  if(confirmed)return;sel=i;
  document.querySelectorAll('.nx-option').forEach((el,idx)=>el.className='nx-option'+(idx===i?' selected':''));
  document.getElementById('btn-confirm').disabled=false;
}
function confirm_answer(){
  if(sel<0||confirmed)return;confirmed=true;
  const q=sq[cur],ok=sel===q.c;
  if(ok)rights++;else wrongs++;
  document.querySelectorAll('.nx-option').forEach((el,idx)=>{
    if(idx===q.c)el.className='nx-option correct';
    else if(idx===sel&&!ok)el.className='nx-option wrong';
    else el.className='nx-option dimmed';
  });
  const fb=document.getElementById('feedback');
  fb.className='nx-feedback '+(ok?'correct':'wrong');
  document.getElementById('fb-label').textContent=ok?'CORRETO':'INCORRETO';
  document.getElementById('fb-text').textContent=q.exp;
  document.getElementById('btn-confirm').className='nx-btn-primary hidden';
  document.getElementById('btn-next').className='nx-btn-next';
  document.getElementById('btn-aula').className='nx-btn-aula';
  const tot=rights+wrongs;
  document.getElementById('sr').textContent=rights;
  document.getElementById('sw').textContent=wrongs;
  document.getElementById('sp').textContent=Math.round(rights/tot*100)+'%';
}
function nextQ(){
  cur++;
  if(cur>=sq.length){
    stopTimer();quizEnded=true;
    document.getElementById('q-label').textContent='quiz concluído';
    document.getElementById('q-text').textContent='Parabéns! Acertos: '+rights+' · Erros: '+wrongs;
    document.getElementById('options').innerHTML='';
    document.getElementById('btn-confirm').className='nx-btn-primary hidden';
    document.getElementById('btn-next').className='nx-btn-next hidden';
    document.getElementById('feedback').className='nx-feedback';
    document.getElementById('prog-fill').style.width='100%';
    document.getElementById('prog-count').textContent=TOTAL+' / '+TOTAL;
    return;
  }
  render();
}
render();startTimer();

/* MINI-AULA */
const aulaDemo={
  texto:`A corrupção em compras (procurement fraud) é uma das formas mais custosas de fraude corporativa. O kickback ocorre quando um funcionário aprova pagamentos a um fornecedor em troca de uma "comissão" devolvida — em espécie, presente ou favor. O bid rigging é o conluio entre concorrentes para garantir que um deles vença a licitação com preço artificialmente elevado.\n\nA detecção passa por análise de dados: concentração de contratos em um fornecedor, variações de preço fora do padrão, aprovações sem alçada adequada e relacionamentos não declarados entre compradores e fornecedores são os principais indicadores.\n\nControles preventivos incluem segregação de funções no processo de compra, rotação de pessoal em cargos críticos, due diligence de fornecedores e canal de denúncias anônimas (hotline).\n\nMacete: "Fornecedor único + preço alto + aprovação rápida = red flag de kickback."`,
  fonte:`ACFE — Fraud Examiners Manual, 2023 Edition. Chapter 1.3 — Corruption Schemes. Association of Certified Fraud Examiners, Austin TX.`
};
function openAula(){
  document.getElementById('aula-text').innerHTML=aulaDemo.texto.split('\n\n').map(p=>
    `<p style="font-size:14px;font-family:'Barlow',sans-serif;font-weight:300;color:#d4c4b8;line-height:1.65;margin-bottom:14px;">${p}</p>`
  ).join('');
  document.getElementById('aula-fonte').textContent=aulaDemo.fonte;
  document.getElementById('nx-aula-sheet').classList.add('open');
  const ov=document.getElementById('nx-aula-overlay');
  ov.style.opacity='1';ov.style.pointerEvents='all';
}
function closeAula(){
  document.getElementById('nx-aula-sheet').classList.remove('open');
  const ov=document.getElementById('nx-aula-overlay');
  ov.style.opacity='0';ov.style.pointerEvents='none';
}
function ttsQuestao(btn){TTS.speak(document.getElementById('q-text').textContent,btn);}
function ttsFeedback(btn){TTS.speak(document.getElementById('fb-text').textContent,btn);}
function ttsAula(btn){TTS.speak(document.getElementById('aula-text').textContent,btn);}
</script>
