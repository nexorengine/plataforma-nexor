<head>

<meta name="viewport" content="width=device-width,initial-scale=1.0">

</head>
<body>
<div class="nx-header">
  <a href="c3-sd06.html" class="nx-back-btn"><i class="ti ti-arrow-left"></i>voltar</a>
  <div class="nx-wordmark">nexor_<span>cert</span></div>
  <div class="nx-lang"><a href="#" class="active">PT</a><a href="#">EN</a></div>
  <a href="#" class="nx-avatar-btn">AA</a>
</div>
<div class="nx-scroll">
<div class="nx-body">
  <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px;background:#160810;border:1px solid #5E503F;border-radius:6px;padding:12px 14px;">
    <div class="nx-icon-slot-text" style="width:40px;height:40px;font-size:12px;flex-shrink:0;">CFE</div>
    <div>
      <div style="font-size:10px;font-family:'Barlow',sans-serif;font-weight:300;color:#A9927D;margin-bottom:2px;">CFE · S1 · SD06</div>
      <div style="font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:15px;color:#F2F4F3;line-height:1.1;">Corruption, Bribery & COI</div>
      <div style="font-size:11px;color:#9a8a84;font-weight:300;margin-top:1px;">Flashcards · 48 cards</div>
    </div>
  </div>

  <div class="nx-meta">
    <span class="nx-meta-label">progresso da sessão</span>
    <span class="nx-layer-badge" id="layer-badge">F1</span>
  </div>
  <div class="nx-prog-row">
    <div class="nx-prog-bar-bg"><div class="nx-prog-bar-fill" id="prog-fill" style="width:2%;"></div></div>
    <span class="nx-prog-count" id="prog-count">1 / 48</span>
  </div>

  <div class="nx-card" id="nx-card" style="position:relative;">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;">
      <div class="nx-card-face" id="card-face" style="margin-bottom:0;">frente</div>
      <button class="tts-btn" id="tts-card-btn" onclick="ttsCard(this)" title="Ouvir em voz alta" style="position:absolute;top:14px;right:14px;"><i class="ti ti-volume"></i></button>
    </div>
    <div class="nx-card-text" id="card-text"></div>
  </div>

  <button class="nx-btn-primary" id="btn-flip" onclick="flipCard()">
    VIRAR
  </button>
  <div class="nx-actions hidden" id="actions">
    <button class="nx-btn-wrong" onclick="answer(false)"><i class="ti ti-x"></i></button>
    <button class="nx-btn-right" onclick="answer(true)"><i class="ti ti-check"></i></button>
  </div>

  <div class="nx-stats-row" style="margin-top:8px;">
    <div class="nx-stat"><div class="nx-stat-val" id="sr" style="color:#4ade80;">0</div><div class="nx-stat-lbl">acertos</div></div>
    <div class="nx-stat"><div class="nx-stat-val" id="sw" style="color:#f87171;">0</div><div class="nx-stat-lbl">erros</div></div>
    <div class="nx-stat"><div class="nx-stat-val" id="sl" style="color:#A9927D;">48</div><div class="nx-stat-lbl">restantes</div></div>
  </div>
</div>
</div>
<div class="nx-footer"><span>nexor_ · Certification Readiness Engine · Powered by FractalLearning™</span></div>
<script src="assets/tts.js"></script>
<script>
const cards=[
  {f:"Defina corrupção no contexto do CFE e cite os dois tipos principais.",v:"Uso do cargo para obter vantagem indevida. Tipos: suborno (bribery) — pagamento para influenciar decisão — e conflito de interesses (COI) — interesse pessoal que interfere na tomada de decisão profissional.",l:"F1"},
  {f:"O que caracteriza um esquema de suborno (bribery scheme)?",v:"Oferta, pagamento ou recebimento de algo de valor para influenciar uma ação oficial ou decisão de negócios. Pode ser ativo (quem paga) ou passivo (quem recebe).",l:"F1"},
  {f:"Diferencie kickback de bid rigging.",v:"Kickback: fornecedor devolve parte do pagamento recebido ao funcionário que aprovou o contrato. Bid rigging: conluio entre concorrentes para manipular o resultado de licitações.",l:"F2"},
  {f:"Quais são os três elementos de um conflito de interesses (COI)?",v:"1) Interesse pessoal do funcionário; 2) relação com uma decisão profissional; 3) ausência de divulgação adequada à organização.",l:"F2"},
  {f:"Caso prático: gerente de compras aprova contrato superfaturado com empresa de familiar sem declarar o vínculo. Que fraude é essa?",v:"Conflito de interesses não divulgado — o gerente tem interesse pessoal (familiar beneficiado) que compromete a decisão profissional, configurando COI.",l:"F3"},
  {f:"Cite três red flags de suborno em procurement.",v:"1) Fornecedor único sem justificativa; 2) preço acima do mercado aprovado sem análise; 3) funcionário com padrão de vida incompatível com salário.",l:"F3"},
  {f:"Síntese: como o FCPA e a UK Bribery Act diferem quanto à jurisdição?",v:"FCPA (EUA): proíbe suborno de funcionários públicos estrangeiros por empresas americanas ou com nexo com os EUA. UK Bribery Act: mais ampla — abrange suborno privado-para-privado e tem alcance extraterritorial para qualquer empresa com presença no Reino Unido.",l:"F4"},
];
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
shuffle(cards);
let cur=0,flipped=false,rights=0,wrongs=0;
const TOTAL=48;
function render(){
  flipped=false;
  const c=cards[cur];
  document.getElementById('card-face').textContent='frente';
  document.getElementById('card-text').textContent=c.f;
  document.getElementById('nx-card').className='nx-card';
  document.getElementById('layer-badge').textContent=c.l;
  document.getElementById('btn-flip').className='nx-btn-primary';
  document.getElementById('actions').className='nx-actions hidden';
  document.getElementById('prog-fill').style.width=Math.max(2,Math.round(cur/TOTAL*100))+'%';
  document.getElementById('prog-count').textContent=(cur+1)+' / '+TOTAL;
  document.getElementById('sr').textContent=rights;
  document.getElementById('sw').textContent=wrongs;
  document.getElementById('sl').textContent=TOTAL-cur;
}
function flipCard(){
  if(flipped)return;
  flipped=true;
  const c=cards[cur];
  document.getElementById('card-face').textContent='verso';
  document.getElementById('card-text').textContent=c.v;
  document.getElementById('nx-card').className='nx-card flipped';
  document.getElementById('btn-flip').className='nx-btn-primary hidden';
  document.getElementById('actions').className='nx-actions';
}
function answer(ok){
  if(ok)rights++;else wrongs++;
  cur++;
  if(cur>=cards.length){
    document.getElementById('card-face').textContent='sessão concluída';
    document.getElementById('card-text').textContent='Acertos: '+rights+' · Erros: '+wrongs;
    document.getElementById('nx-card').className='nx-card';
    document.getElementById('btn-flip').className='nx-btn-primary hidden';
    document.getElementById('actions').className='nx-actions hidden';
    document.getElementById('prog-fill').style.width='100%';
    document.getElementById('prog-count').textContent=TOTAL+' / '+TOTAL;
    document.getElementById('sr').textContent=rights;
    document.getElementById('sw').textContent=wrongs;
    document.getElementById('sl').textContent=0;
    return;
  }
  render();
}
render();
function ttsCard(btn){ TTS.speak(document.getElementById('card-text').textContent, btn); }
</script>
</body>
</html>
