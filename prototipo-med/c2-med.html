<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta name="theme-color" content="#16263B">
<title>nexor_med · Domínios</title>
<link rel="stylesheet" href="assets/nx.css">
<style>
.hero-reveal{opacity:0;transform:translateY(20px);filter:blur(6px);transition:opacity 700ms cubic-bezier(0.16,1,0.3,1),transform 700ms cubic-bezier(0.16,1,0.3,1),filter 700ms cubic-bezier(0.16,1,0.3,1);}
.hero-reveal.visible{opacity:1;transform:translateY(0);filter:blur(0);}
.sr{opacity:0;transform:translateY(15px);transition:opacity 600ms cubic-bezier(0.16,1,0.3,1),transform 600ms cubic-bezier(0.16,1,0.3,1);}
.sr.visible{opacity:1;transform:translateY(0);}
.nx-domain-row{transition:transform 250ms cubic-bezier(0.16,1,0.3,1),box-shadow 250ms ease,background 200ms ease;}
.nx-domain-row:hover{transform:translateX(4px);background:rgba(252,163,17,0.06)!important;}
@media(prefers-reduced-motion:reduce){.hero-reveal,.sr{opacity:1!important;transform:none!important;filter:none!important;}}
</style>
</head>
<body>
<div class="nx-header">
  <a href="c1-med" class="nx-back-btn"><i class="ti ti-arrow-left"></i>voltar</a>
  <div class="nx-wordmark">nexor_<span>med</span></div>
  <button class="nx-bell-btn" id="nx-bell-btn" onclick="toggleNotif()"><i class="ti ti-bell"></i></button>
  <a href="#" class="nx-avatar-btn" onclick="toggleProfile();return false;">AA</a>
</div>
<div class="nx-scroll">
<div class="nx-body">
  <div id="area-header"></div>
  <div class="nx-section-header">
    <div class="nx-section-title" id="sec-title">Domínios</div>
    <div class="nx-section-meta-txt" id="sec-meta"></div>
  </div>
  <div id="lista-dominios"></div>
</div>
</div>
<div class="nx-footer"><span>nexor_med · Residência Médica · Powered by FractalLearning™</span></div>
<script src="assets/notif.js"></script>
<script src="assets/profile.js"></script>
<script src="assets/catalog.js"></script>
<script>
const hash = Object.fromEntries(window.location.hash.replace('#','').split('&').map(p=>p.split('=')));
const areaSlug = hash.area || new URLSearchParams(window.location.search).get('area') || 'cirurgia_geral';
const area = CATALOG[areaSlug];

if (!area) {
  document.getElementById('area-header').innerHTML = '<p style="color:#ef4444;padding:20px;">Especialidade não encontrada.</p>';
} else {
  document.title = area.label + ' · nexor_med';
  const n = area.dominios.length;

  document.getElementById('area-header').innerHTML = `
    <div style="display:flex;align-items:center;gap:14px;margin-bottom:20px;">
      <div class="nx-icon-slot" style="width:52px;height:52px;flex-shrink:0;"><i class="ti ${area.icon}" style="font-size:24px;"></i></div>
      <div>
        <div style="font-size:10px;font-family:'Barlow',sans-serif;font-weight:300;color:#FCA311;letter-spacing:0.08em;text-transform:uppercase;margin-bottom:3px;">nexor_med · Especialidade</div>
        <div style="font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:20px;color:#F0F6FB;line-height:1.1;">${area.label}</div>
        <div style="font-size:12px;color:#AAA;font-weight:300;margin-top:2px;">${n} domínios · ${n*48} flashcards · ${n*100} questões</div>
      </div>
    </div>
    <div style="display:flex;justify-content:space-between;margin-bottom:16px;background:#16263B;border:1px solid #1d3452;border-radius:6px;padding:10px 14px;">
      <div style="display:flex;align-items:center;gap:5px;font-size:10px;color:#AAA;font-weight:300;"><i class="ti ti-circle-check" style="color:#4ade80;font-size:14px;"></i>satisfatório ≥80%</div>
      <div style="display:flex;align-items:center;gap:5px;font-size:10px;color:#AAA;font-weight:300;"><i class="ti ti-circle-check" style="color:#FCA311;font-size:14px;"></i>mediano 50-79%</div>
      <div style="display:flex;align-items:center;gap:5px;font-size:10px;color:#AAA;font-weight:300;"><i class="ti ti-ban" style="color:#ef4444;font-size:14px;"></i>insuficiente</div>
    </div>`;

  document.getElementById('sec-title').textContent = 'Domínios · ' + area.label;
  document.getElementById('sec-meta').textContent = n + ' domínios';

  document.getElementById('lista-dominios').innerHTML = area.dominios.map((d, i) => `
    <a href="c3-med#area=${areaSlug}&dominio=${d.slug}" class="nx-domain-row sr" style="transition-delay:${i*50}ms">
      <div class="nx-dot"></div>
      <span class="nx-domain-code-txt">${d.code}</span>
      <span class="nx-domain-name-txt">${d.nome}</span>
      <span class="nx-domain-score" style="color:#555;">—</span>
      <div class="nx-status-icon"><i class="ti ti-circle-dashed" style="color:#555;font-size:16px;"></i></div>
    </a>`).join('');

  (function(){
    const scrollEl = document.querySelector('.nx-scroll');
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        ['area-header','sec-title','sec-meta'].forEach((id, i) => {
          const el = document.getElementById(id);
          if (!el) return;
          el.classList.add('hero-reveal');
          el.style.transitionDelay = (i * 80) + 'ms';
          el.classList.add('visible');
        });
      });
    });
    const io = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) { entry.target.classList.add('visible'); io.unobserve(entry.target); }
      });
    }, { root: scrollEl, threshold: 0.08 });
    document.querySelectorAll('.sr').forEach(el => io.observe(el));
  })();
}
</script>
</body>
</html>
