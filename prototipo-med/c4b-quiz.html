<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta name="theme-color" content="#16263B">
<title>Quiz · nexor_med</title>
<link rel="stylesheet" href="assets/nx.css">
</head>
<body>
<div class="nx-header">
  <a href="c3-med.html" class="nx-back-btn" id="btn-back"><i class="ti ti-arrow-left"></i>voltar</a>
  <div class="nx-wordmark">nexor_<span>med</span></div>
  <button class="nx-bell-btn" id="nx-bell-btn" onclick="toggleNotif()"><i class="ti ti-bell"></i></button>
  <a href="#" class="nx-avatar-btn" onclick="toggleProfile();return false;">AA</a>
</div>
<div class="nx-scroll">
<div class="nx-body">
  <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px;background:#16263B;border:1px solid #1d3452;border-radius:6px;padding:12px 14px;">
    <div class="nx-icon-slot" style="width:40px;height:40px;flex-shrink:0;"><i class="ti ti-cut" style="font-size:18px;"></i></div>
    <div style="flex:1;min-width:0;">
      <div style="font-size:10px;font-family:'Barlow',sans-serif;font-weight:300;color:#FCA311;margin-bottom:2px;">Cirurgia Geral · CG_D01</div>
      <div style="font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:15px;color:#F0F6FB;line-height:1.1;">Abdome Agudo</div>
      <div style="font-size:11px;color:#AAA;font-weight:300;margin-top:1px;" id="quiz-sub">Quiz 001 · 50 questões</div>
    </div>
    <div id="timer-display" style="font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:22px;color:#FCA311;letter-spacing:0.04em;flex-shrink:0;">60:00</div>
  </div>

  <div class="nx-prog-row">
    <div class="nx-prog-bar-bg"><div class="nx-prog-bar-fill" id="prog-fill" style="width:2%;"></div></div>
    <span class="nx-prog-count" id="prog-count">1 / 50</span>
  </div>

  <div style="background:#16263B;border:1px solid #1d3452;border-radius:8px;padding:20px;margin-bottom:14px;">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
      <div style="font-size:10px;font-family:'Barlow',sans-serif;font-weight:300;color:#555;letter-spacing:0.08em;text-transform:uppercase;" id="q-label">questão 01</div>
      <button class="tts-btn" id="tts-q-btn" onclick="ttsQuestao(this)" title="Ouvir em voz alta"><i class="ti ti-volume"></i></button>
    </div>
    <div style="font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:18px;color:#F0F6FB;line-height:1.35;" id="q-text"></div>
  </div>

  <div class="nx-options" id="options"></div>

  <button class="nx-btn-primary" id="btn-confirm" onclick="confirm_answer()" disabled>
    CONFIRMAR
  </button>
  <div class="nx-feedback" id="feedback">
    <div style="position:relative;display:flex;align-items:center;justify-content:center;margin-bottom:6px;">
      <span class="nx-fb-label" id="fb-label" style="margin-bottom:0;text-align:center;"></span>
      <button class="tts-btn" id="tts-fb-btn" onclick="ttsFeedback(this)" title="Ouvir explicação" style="position:absolute;right:0;"><i class="ti ti-volume"></i></button>
    </div>
    <span id="fb-text"></span>
  </div>
  <button class="nx-btn-aula hidden" id="btn-aula" onclick="openAula()">
    RESUMO ANALÍTICO
  </button>
  <button class="nx-btn-next hidden" id="btn-next" onclick="nextQ()">
    PRÓXIMA
  </button>

  <!-- BOTTOM SHEET: MINI-AULA -->
  <div id="nx-aula-overlay" style="position:fixed;inset:0;z-index:299;background:rgba(0,0,0,0.6);opacity:0;pointer-events:none;transition:opacity 0.3s;" onclick="closeAula()"></div>
  <div id="nx-aula-sheet" class="nx-aula-sheet">
    <div class="nx-sheet-handle"></div>
    <div style="display:flex;align-items:center;justify-content:space-between;padding:16px 20px 12px;border-bottom:1px solid #1d3452;">
      <div style="flex:1;text-align:center;">
        <span style="font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:16px;color:#F0F6FB;letter-spacing:0.05em;">RESUMO ANALÍTICO</span>
      </div>
      <button class="tts-btn" id="tts-aula-btn" onclick="ttsAula(this)" title="Ouvir em voz alta"><i class="ti ti-volume"></i></button>
    </div>
    <div style="padding:20px 20px 8px;" id="aula-text"></div>
    <div style="margin:0 20px;padding:12px 14px;background:#070A0E;border:1px solid rgba(255,255,255,0.35);border-radius:6px;">
      <div style="font-size:10px;color:#FCA311;font-family:'Barlow',sans-serif;letter-spacing:0.08em;text-transform:uppercase;margin-bottom:4px;">Fonte</div>
      <div style="font-size:12px;color:#F0F6FB;font-family:'Barlow',sans-serif;font-weight:300;line-height:1.5;" id="aula-fonte"></div>
    </div>
    <div style="height:16px;"></div>
  </div>

  <div class="nx-stats-row">
    <div class="nx-stat"><div class="nx-stat-val" id="sr" style="color:#4ade80;">0</div><div class="nx-stat-lbl">acertos</div></div>
    <div class="nx-stat"><div class="nx-stat-val" id="sw" style="color:#f87171;">0</div><div class="nx-stat-lbl">erros</div></div>
    <div class="nx-stat"><div class="nx-stat-val" id="sp" style="color:#FCA311;">—</div><div class="nx-stat-lbl">aproveitamento</div></div>
  </div>
</div>
</div>
<div class="nx-footer"><span>nexor_med · Residência Médica · Powered by FractalLearning™</span></div>
<script src="assets/notif.js"></script>
<script src="assets/profile.js"></script>
<script src="assets/tts.js"></script>
<script>
const params=new URLSearchParams(window.location.search);
const qn=params.get('n')||'1';
const area=params.get('area')||'cirurgia_geral';
const dominio=params.get('dominio')||'abdome_agudo';
document.getElementById('quiz-sub').textContent='Quiz 00'+qn+' · carregando...';

function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function shuffleQ(q){const idx=q.opts.map((o,i)=>({t:o,i}));shuffle(idx);return{q:q.q,opts:idx.map(x=>x.t),c:idx.findIndex(x=>x.i===q.c),exp:q.exp};}

let sq=[],cur=0,sel=-1,confirmed=false,rights=0,wrongs=0;
let TOTAL=50;
const keys=['A','B','C','D'];

async function loadQuiz(){
  const pad=qn.padStart(3,'0');
  const url=`content/quizzes/${area}/${dominio}/quiz_${pad}.json`;
  try{
    const res=await fetch(url);
    if(!res.ok) throw new Error('not found');
    const data=await res.json();
    TOTAL=data.total||data.questions.length;
    document.getElementById('quiz-sub').textContent='Quiz 00'+qn+' · '+TOTAL+' questões';
    const questions=data.questions;
    shuffle(questions);
    sq=questions.map(shuffleQ);
    startTimer();
    render();
  }catch(e){
    document.getElementById('q-text').textContent='Erro ao carregar o quiz. Verifique o caminho: '+url;
    document.getElementById('q-label').textContent='erro';
  }
}
loadQuiz();

/* ── TIMER ── */
const TIMER_TOTAL = 60 * 60; // 60 minutos em segundos
let timerSec = TIMER_TOTAL;
let timerInterval = null;
let quizEnded = false;

function startTimer(){
  timerInterval = setInterval(() => {
    timerSec--;
    updateTimerDisplay();
    if(timerSec <= 0){ clearInterval(timerInterval); timeUp(); }
  }, 1000);
}

function updateTimerDisplay(){
  const el = document.getElementById('timer-display');
  const m = Math.floor(timerSec / 60);
  const s = timerSec % 60;
  el.textContent = String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
  if(timerSec <= 180){
    el.style.color = '#ef4444';
    el.style.animation = 'nx-pulse 1s ease-in-out infinite';
  } else if(timerSec <= 600){
    el.style.color = '#FCA311';
    el.style.animation = '';
  } else {
    el.style.color = '#FCA311';
    el.style.animation = '';
  }
}

function stopTimer(){
  clearInterval(timerInterval);
  timerInterval = null;
}

function timeUp(){
  if(quizEnded) return;
  quizEnded = true;
  TTS.stop && TTS.stop();
  document.getElementById('q-label').textContent = 'tempo esgotado';
  document.getElementById('q-text').textContent = 'O tempo da prova encerrou. Acertos: ' + rights + ' · Erros: ' + wrongs;
  document.getElementById('options').innerHTML = '';
  document.getElementById('btn-confirm').className = 'nx-btn-primary hidden';
  document.getElementById('btn-next').className = 'nx-btn-next hidden';
  document.getElementById('feedback').className = 'nx-feedback wrong';
  document.getElementById('fb-label').textContent = '✗ tempo esgotado';
  document.getElementById('fb-text').textContent = 'Você respondeu ' + (rights+wrongs) + ' de ' + TOTAL + ' questões. Aproveitamento: ' + (rights+wrongs > 0 ? Math.round(rights/(rights+wrongs)*100) : 0) + '%.';
  document.getElementById('prog-fill').style.width = Math.round((rights+wrongs)/TOTAL*100) + '%';
  const timerEl = document.getElementById('timer-display');
  timerEl.textContent = '00:00';
  timerEl.style.color = '#ef4444';
}

// Ao clicar em voltar: para timer, NÃO conta como tentativa
document.getElementById('btn-back').addEventListener('click', () => {
  stopTimer();
});

/* ── QUIZ ── */
function render(){
  sel=-1;confirmed=false;
  const q=sq[cur];
  document.getElementById('q-label').textContent='questão '+String(cur+1).padStart(2,'0');
  document.getElementById('q-text').textContent=q.q;
  const opts=document.getElementById('options');
  opts.innerHTML='';
  q.opts.forEach((o,i)=>{
    const d=document.createElement('div');
    d.className='nx-option';
    d.innerHTML=`<span class="nx-opt-key">${keys[i]}</span><span class="nx-opt-text">${o}</span>`;
    d.onclick=()=>selectOpt(i);
    opts.appendChild(d);
  });
  document.getElementById('btn-confirm').disabled=true;
  document.getElementById('btn-confirm').className='nx-btn-primary';
  document.getElementById('feedback').className='nx-feedback';
  document.getElementById('btn-next').className='nx-btn-next hidden';
  document.getElementById('btn-aula').className='nx-btn-aula hidden';
  closeAula();
  document.getElementById('prog-fill').style.width=Math.max(2,Math.round(cur/TOTAL*100))+'%';
  document.getElementById('prog-count').textContent=(cur+1)+' / '+TOTAL;
}

function selectOpt(i){
  if(confirmed)return;
  sel=i;
  document.querySelectorAll('.nx-option').forEach((el,idx)=>el.className='nx-option'+(idx===i?' selected':''));
  document.getElementById('btn-confirm').disabled=false;
}

function confirm_answer(){
  if(sel<0||confirmed)return;
  confirmed=true;
  const q=sq[cur];
  const ok=sel===q.c;
  if(ok)rights++;else wrongs++;
  document.querySelectorAll('.nx-option').forEach((el,idx)=>{
    if(idx===q.c)el.className='nx-option correct';
    else if(idx===sel&&!ok)el.className='nx-option wrong';
    else el.className='nx-option dimmed';
  });
  const fb=document.getElementById('feedback');
  fb.className='nx-feedback '+(ok?'correct':'wrong');
  document.getElementById('fb-label').textContent=ok?'CORRETO':'INCORRETO';
  document.getElementById('fb-text').textContent=q.exp;
  document.getElementById('btn-confirm').className='nx-btn-primary hidden';
  document.getElementById('btn-next').className='nx-btn-next';
  document.getElementById('btn-aula').className='nx-btn-aula';
  const tot=rights+wrongs;
  document.getElementById('sr').textContent=rights;
  document.getElementById('sw').textContent=wrongs;
  document.getElementById('sp').textContent=Math.round(rights/tot*100)+'%';
}

function nextQ(){
  cur++;
  if(cur>=sq.length){
    stopTimer();
    quizEnded=true;
    document.getElementById('q-label').textContent='quiz concluído';
    document.getElementById('q-text').textContent='Parabéns! Acertos: '+rights+' · Erros: '+wrongs;
    document.getElementById('options').innerHTML='';
    document.getElementById('btn-confirm').className='nx-btn-primary hidden';
    document.getElementById('btn-next').className='nx-btn-next hidden';
    document.getElementById('feedback').className='nx-feedback';
    document.getElementById('prog-fill').style.width='100%';
    document.getElementById('prog-count').textContent=TOTAL+' / '+TOTAL;
    return;
  }
  render();
}

/* render() e startTimer() são chamados dentro de loadQuiz() após o fetch */

/* ── MINI-AULA ── */
let resumosData = null;

async function loadResumos(){
  const pad = qn.padStart(3,'0');
  const url = `content/resumos/${area}/${dominio}/quiz_${pad}_resumos.json`;
  try {
    const res = await fetch(url);
    if(res.ok) resumosData = await res.json();
  } catch(e) { /* sem resumos disponíveis */ }
}
loadResumos();

function openAula(){
  const idx = cur; // índice 0-based da questão atual
  let texto = '';
  let fonte = '';
  if(resumosData && resumosData.resumos && resumosData.resumos[idx]){
    const r = resumosData.resumos[idx];
    texto = r.texto;
    fonte = r.fonte || '';
  } else {
    const q = sq[cur];
    texto = q.exp;
    fonte = 'Explicação do gabarito';
  }
  document.getElementById('aula-text').innerHTML = texto.split('\n\n').map(p =>
    `<p style="font-size:14px;font-family:'Barlow',sans-serif;font-weight:300;color:#E0E0E0;line-height:1.65;margin-bottom:14px;">${p}</p>`
  ).join('');
  document.getElementById('aula-fonte').textContent = fonte;
  const sheet = document.getElementById('nx-aula-sheet');
  const overlay = document.getElementById('nx-aula-overlay');
  sheet.classList.add('open');
  overlay.style.opacity = '1';
  overlay.style.pointerEvents = 'auto';
}

function closeAula(){
  const sheet = document.getElementById('nx-aula-sheet');
  const overlay = document.getElementById('nx-aula-overlay');
  if(!sheet) return;
  sheet.classList.remove('open');
  overlay.style.opacity = '0';
  overlay.style.pointerEvents = 'none';
}

function ttsAula(btn){
  const texto = document.getElementById('aula-text').innerText + '. Fonte: ' + document.getElementById('aula-fonte').textContent;
  TTS.speak(texto, btn);
}

function ttsQuestao(btn){
  const q=sq[cur];
  const opts=['A','B','C','D'];
  const texto=q.q+'. '+q.opts.map((o,i)=>opts[i]+': '+o).join('. ');
  TTS.speak(texto, btn);
}
function ttsFeedback(btn){
  TTS.speak(document.getElementById('fb-text').textContent, btn);
}
</script>
<style>
@keyframes nx-pulse{0%,100%{opacity:1;}50%{opacity:0.4;}}
</style>
</body>
</html>
