<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta name="theme-color" content="#16263B">
<title>Flashcards · nexor_med</title>
<link rel="stylesheet" href="assets/nx.css">
<style>
.hero-reveal{opacity:0;transform:translateY(20px);filter:blur(6px);transition:opacity 700ms cubic-bezier(0.16,1,0.3,1),transform 700ms cubic-bezier(0.16,1,0.3,1),filter 700ms cubic-bezier(0.16,1,0.3,1);}
.hero-reveal.visible{opacity:1;transform:translateY(0);filter:blur(0);}
.sr{opacity:0;transform:translateY(15px);transition:opacity 600ms cubic-bezier(0.16,1,0.3,1),transform 600ms cubic-bezier(0.16,1,0.3,1);}
.sr.visible{opacity:1;transform:translateY(0);}
#nx-card{transition:opacity 250ms cubic-bezier(0.16,1,0.3,1),transform 250ms cubic-bezier(0.16,1,0.3,1);}
.card-fade-out{opacity:0!important;transform:scale(0.97)!important;}
.nx-btn-primary{transition:transform 120ms cubic-bezier(0.16,1,0.3,1),box-shadow 200ms ease;}
.nx-btn-primary:active{transform:scale(0.97)!important;}
.nx-btn-wrong,.nx-btn-right{transition:transform 150ms cubic-bezier(0.16,1,0.3,1);}
.nx-btn-wrong:active{transform:scale(0.92);}
.nx-btn-right:active{transform:scale(0.92);}
@media(prefers-reduced-motion:reduce){#nx-card{transition:none!important;}}
</style>
</head>
<body>
<div class="nx-header">
  <a href="c3-med" class="nx-back-btn"><i class="ti ti-arrow-left"></i>voltar</a>
  <div class="nx-wordmark">nexor_<span>med</span></div>
  <button class="nx-bell-btn" id="nx-bell-btn" onclick="toggleNotif()"><i class="ti ti-bell"></i></button>
  <a href="#" class="nx-avatar-btn" onclick="toggleProfile();return false;">AA</a>
</div>
<div class="nx-scroll">
<div class="nx-body">
  <div id="c4a-header" class="hero-reveal" style="display:flex;align-items:center;gap:12px;margin-bottom:16px;background:#16263B;border:1px solid #1d3452;border-radius:6px;padding:12px 14px;">
    <div class="nx-icon-slot" style="width:40px;height:40px;flex-shrink:0;" id="c4a-icon"><i class="ti ti-cards" style="font-size:18px;"></i></div>
    <div>
      <div style="font-size:10px;font-family:'Barlow',sans-serif;font-weight:300;color:#0EA5E9;margin-bottom:2px;" id="c4a-label">—</div>
      <div style="font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:15px;color:#F0F6FB;line-height:1.1;" id="c4a-nome">—</div>
      <div style="font-size:11px;color:#AAA;font-weight:300;margin-top:1px;">Flashcards · 48 cards</div>
    </div>
  </div>

  <div class="nx-meta sr" style="transition-delay:80ms">
    <span class="nx-meta-label">progresso da sessão</span>
    <span class="nx-layer-badge" id="layer-badge">F1</span>
  </div>
  <div class="nx-prog-row sr" style="transition-delay:120ms">
    <div class="nx-prog-bar-bg"><div class="nx-prog-bar-fill" id="prog-fill" style="width:2%;"></div></div>
    <span class="nx-prog-count" id="prog-count">1 / 48</span>
  </div>

  <div class="nx-card sr" id="nx-card" style="position:relative;">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;">
      <div class="nx-card-face" id="card-face" style="margin-bottom:0;">frente</div>
      <button class="tts-btn" id="tts-card-btn" onclick="ttsCard(this)" title="Ouvir em voz alta" style="position:absolute;top:14px;right:14px;"><i class="ti ti-volume"></i></button>
    </div>
    <div class="nx-card-text" id="card-text"></div>
  </div>

  <button class="nx-btn-primary nx-btn-confirm" id="btn-flip" onclick="flipCard()">
    VIRAR
  </button>
  <div class="nx-actions hidden" id="actions">
    <button class="nx-btn-wrong" onclick="answer(false)"><i class="ti ti-x"></i></button>
    <button class="nx-btn-right" onclick="answer(true)"><i class="ti ti-check"></i></button>
  </div>

  <div class="nx-stats-row" style="margin-top:8px;">
    <div class="nx-stat"><div class="nx-stat-val" id="sr" style="color:#4ade80;">0</div><div class="nx-stat-lbl">acertos</div></div>
    <div class="nx-stat"><div class="nx-stat-val" id="sw" style="color:#f87171;">0</div><div class="nx-stat-lbl">erros</div></div>
    <div class="nx-stat"><div class="nx-stat-val" id="sl" style="color:#0EA5E9;">48</div><div class="nx-stat-lbl">restantes</div></div>
  </div>
</div>
</div>
<div class="nx-footer"><span>nexor_med · Residência Médica · Powered by FractalLearning™</span></div>
<script src="assets/notif.js"></script>
<script src="assets/profile.js"></script>
<script src="assets/catalog.js"></script>
<script src="assets/tts.js"></script>
<script>
const _hash=Object.fromEntries(window.location.hash.replace('#','').split('&').map(p=>p.split('=')));
const _sp=new URLSearchParams(window.location.search);
const area=_hash.area||_sp.get('area')||'cirurgia_geral';
const dominio=_hash.dominio||_sp.get('dominio')||'abdome_agudo';
document.querySelector('.nx-back-btn').href=`c3-med#area=${area}&dominio=${dominio}`;
(function(){
  const cat=typeof CATALOG!=='undefined'?CATALOG:null;
  if(!cat)return;
  const a=cat[area]; const d=a&&a.dominios.find(x=>x.slug===dominio);
  if(!a||!d)return;
  document.getElementById('c4a-icon').innerHTML=`<i class="ti ${a.icon}" style="font-size:18px;"></i>`;
  document.getElementById('c4a-label').textContent=a.label+' · '+d.code;
  document.getElementById('c4a-nome').textContent=d.nome;
  document.title=d.nome+' · Flashcards · nexor_med';
})();

function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

let cards=[],cur=0,flipped=false,rights=0,wrongs=0,TOTAL=48;

async function loadFlashcards(){
  const url=`content/flashcards/${area}/${dominio}/flashcards.json`;
  try{
    const res=await fetch(url);
    if(!res.ok) throw new Error('not found');
    const data=await res.json();
    TOTAL=data.total||data.cards.length;
    cards=data.cards.slice();
    shuffle(cards);
    document.getElementById('sl').textContent=TOTAL;
    document.getElementById('prog-count').textContent='1 / '+TOTAL;
    render();
  }catch(e){
    document.getElementById('card-face').textContent='conteúdo indisponível';
    document.getElementById('card-text').textContent='Não foi possível carregar os flashcards. Tente novamente mais tarde.';
    document.getElementById('btn-flip').className='nx-btn-primary nx-btn-confirm hidden';
  }
}
loadFlashcards();

function _doRender(){
  flipped=false;
  const c=cards[cur];
  document.getElementById('card-face').textContent='frente';
  document.getElementById('card-text').textContent=c.f;
  document.getElementById('nx-card').className='nx-card';
  document.getElementById('layer-badge').textContent=c.l;
  document.getElementById('btn-flip').className='nx-btn-primary nx-btn-confirm';
  document.getElementById('actions').className='nx-actions hidden';
  document.getElementById('prog-fill').style.width=Math.max(2,Math.round(cur/TOTAL*100))+'%';
  document.getElementById('prog-count').textContent=(cur+1)+' / '+TOTAL;
  document.getElementById('sr').textContent=rights;
  document.getElementById('sw').textContent=wrongs;
  document.getElementById('sl').textContent=TOTAL-cur;
}
function render(){
  if(cur===0){ _doRender(); return; }
  const card=document.getElementById('nx-card');
  card.classList.add('card-fade-out');
  setTimeout(()=>{
    card.classList.remove('card-fade-out');
    _doRender();
  }, 160);
}
function flipCard(){
  if(flipped)return;
  flipped=true;
  const c=cards[cur];
  document.getElementById('card-face').textContent='verso';
  document.getElementById('card-text').textContent=c.v;
  document.getElementById('nx-card').className='nx-card flipped';
  document.getElementById('btn-flip').className='nx-btn-primary nx-btn-confirm hidden';
  document.getElementById('actions').className='nx-actions';
}
function answer(ok){
  if(ok)rights++;else wrongs++;
  cur++;
  if(cur>=cards.length){
    const pct=Math.round(rights/TOTAL*100);
    document.getElementById('card-face').textContent='sessão concluída';
    document.getElementById('card-text').textContent='Aproveitamento: '+pct+'% · Acertos: '+rights+' · Erros: '+wrongs;
    document.getElementById('nx-card').className='nx-card';
    document.getElementById('btn-flip').className='nx-btn-primary nx-btn-confirm hidden';
    document.getElementById('actions').className='nx-actions hidden';
    document.getElementById('prog-fill').style.width='100%';
    document.getElementById('prog-count').textContent=TOTAL+' / '+TOTAL;
    document.getElementById('sr').textContent=rights;
    document.getElementById('sw').textContent=wrongs;
    document.getElementById('sl').textContent=0;
    const btnQuiz=document.createElement('a');
    btnQuiz.href='c4b-quiz#area='+area+'&dominio='+dominio+'&n=1';
    btnQuiz.className='nx-btn-primary';
    btnQuiz.style.cssText='display:block;text-align:center;text-decoration:none;margin-top:12px;';
    btnQuiz.textContent='IR PARA O QUIZ';
    document.getElementById('actions').insertAdjacentElement('afterend', btnQuiz);
    return;
  }
  render();
}
function ttsCard(btn){ TTS.speak(document.getElementById('card-text').textContent, btn); }

// motion init
(function(){
  const scrollEl = document.querySelector('.nx-scroll');
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      document.querySelectorAll('.hero-reveal').forEach(el => el.classList.add('visible'));
    });
  });
  const io = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) { entry.target.classList.add('visible'); io.unobserve(entry.target); }
    });
  }, { root: null, threshold: 0.08 });
  document.querySelectorAll('.sr').forEach(el => io.observe(el));
})();
</script>
</body>
</html>
