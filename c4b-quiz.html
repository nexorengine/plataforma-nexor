<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta name="theme-color" content="#16263B">
<title>Quiz · nexor_med</title>
<link rel="stylesheet" href="assets/nx.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/auth.js"></script>
</head>
<body>
<div class="nx-header">
  <a href="c3-med" class="nx-back-btn" id="btn-back"><i class="ti ti-arrow-left"></i>voltar</a>
  <div class="nx-wordmark"><i class="ti ti-first-aid-kit" style="font-size:15px;color:#0EA5E9;margin-right:5px;vertical-align:-1px;" aria-hidden="true"></i>nexor_<span>med</span></div>
  <button class="nx-bell-btn" id="nx-bell-btn" onclick="toggleNotif()"><i class="ti ti-bell"></i></button>
  <a href="#" class="nx-avatar-btn" onclick="toggleProfile();return false;">AA</a>
</div>
<div class="nx-scroll">
<div class="nx-body">
  <div class="hero-reveal" style="display:flex;align-items:center;gap:12px;margin-bottom:16px;background:#16263B;border:1px solid #1d3452;border-radius:6px;padding:12px 14px;">
    <div class="nx-icon-slot" style="width:40px;height:40px;flex-shrink:0;" id="c4b-icon"><i class="ti ti-clipboard-check" style="font-size:18px;"></i></div>
    <div style="flex:1;min-width:0;">
      <div style="font-size:10px;font-family:'Barlow',sans-serif;font-weight:300;color:#FCA311;margin-bottom:2px;" id="c4b-label">—</div>
      <div style="font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:15px;color:#F0F6FB;line-height:1.1;" id="c4b-nome">—</div>
      <div style="font-size:11px;color:#AAA;font-weight:300;margin-top:1px;" id="quiz-sub">Quiz 001 · 50 questões</div>
    </div>
    <div id="timer-display" style="font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:22px;color:#FCA311;letter-spacing:0.04em;flex-shrink:0;">60:00</div>
  </div>

  <div class="nx-prog-row sr" style="transition-delay:100ms">
    <div class="nx-prog-bar-bg"><div class="nx-prog-bar-fill" id="prog-fill" style="width:2%;"></div></div>
    <span class="nx-prog-count" id="prog-count">1 / 50</span>
  </div>

  <div class="sr" style="transition-delay:160ms;background:#16263B;border:1px solid #1d3452;border-radius:8px;padding:20px;margin-bottom:14px;">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
      <div style="font-size:12px;font-family:'Barlow',sans-serif;font-weight:400;color:#888;letter-spacing:0.08em;text-transform:uppercase;" id="q-label">questão 01</div>
      <button class="tts-btn" id="tts-q-btn" onclick="ttsQuestao(this)" title="Ouvir em voz alta"><i class="ti ti-volume"></i></button>
    </div>
    <div style="font-family:'Barlow',sans-serif;font-weight:400;font-size:16px;color:#F0F6FB;line-height:1.5;" id="q-text"></div>
  </div>

  <div class="nx-options sr" id="options" style="transition-delay:220ms"></div>

  <button class="nx-btn-primary" id="btn-confirm" onclick="confirm_answer()" disabled>
    CONFIRMAR
  </button>
  <div class="nx-feedback" id="feedback">
    <span class="nx-fb-label" id="fb-label" style="text-align:center;"></span>
    <span id="fb-text"></span>
  </div>
  <button class="nx-btn-aula hidden" id="btn-aula" onclick="openAula()">
    RESUMO ANALÍTICO
  </button>
  <button class="nx-btn-next hidden" id="btn-next" onclick="nextQ()">
    PRÓXIMA
  </button>

  <!-- BOTTOM SHEET: MINI-AULA -->
  <div id="nx-aula-overlay" style="position:fixed;inset:0;z-index:299;background:rgba(0,0,0,0.6);opacity:0;pointer-events:none;transition:opacity 0.3s;" onclick="closeAula()"></div>
  <div id="nx-aula-sheet" class="nx-aula-sheet">
    <div class="nx-sheet-handle"></div>
    <div style="display:flex;align-items:center;justify-content:space-between;padding:16px 20px 12px;border-bottom:1px solid #1d3452;">
      <div style="flex:1;text-align:center;">
        <span style="font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:16px;color:#F0F6FB;letter-spacing:0.05em;">RESUMO ANALÍTICO</span>
      </div>
      <button class="tts-btn" id="tts-aula-btn" onclick="ttsAula(this)" title="Ouvir em voz alta"><i class="ti ti-volume"></i></button>
    </div>
    <div style="padding:20px 20px 8px;" id="aula-text"></div>
    <div style="margin:0 20px;padding:12px 14px;background:#070A0E;border:1px solid rgba(255,255,255,0.35);border-radius:6px;">
      <div style="font-size:10px;color:#FCA311;font-family:'Barlow',sans-serif;letter-spacing:0.08em;text-transform:uppercase;margin-bottom:4px;">Fonte</div>
      <div style="font-size:12px;color:#F0F6FB;font-family:'Barlow',sans-serif;font-weight:300;line-height:1.5;" id="aula-fonte"></div>
    </div>
    <div style="height:16px;"></div>
  </div>

  <div class="nx-stats-row">
    <div class="nx-stat"><div class="nx-stat-val" id="sr" style="color:#4ade80;">0</div><div class="nx-stat-lbl">acertos</div></div>
    <div class="nx-stat"><div class="nx-stat-val" id="sw" style="color:#f87171;">0</div><div class="nx-stat-lbl">erros</div></div>
    <div class="nx-stat"><div class="nx-stat-val" id="sp" style="color:#FCA311;">—</div><div class="nx-stat-lbl">aproveitamento</div></div>
  </div>
</div>
</div>
<div class="nx-footer"><span>nexor_med · Residência Médica · Powered by FractalLearning™</span></div>
<script src="assets/notif.js"></script>
<script src="assets/profile.js"></script>
<script src="assets/catalog.js"></script>
<script>
// Protege a rota — redireciona para login se não autenticado
(async () => {
  const s = await Auth.requireAuth();
  if (!s) return;
  await Auth.fillHeader();
})();
</script>
<script src="assets/tts.js"></script>
<script>
const _hash=Object.fromEntries(window.location.hash.replace('#','').split('&').map(p=>p.split('=')));
const _sp=new URLSearchParams(window.location.search);
const qn=_hash.n||_sp.get('n')||'1';
const area=_hash.area||_sp.get('area')||'cirurgia_geral';
const dominio=_hash.dominio||_sp.get('dominio')||'abdome_agudo';
document.getElementById('btn-back').href=`c3-med#area=${area}&dominio=${dominio}`;
(function(){
  const a=CATALOG[area]; const d=a&&a.dominios.find(x=>x.slug===dominio);
  if(!a||!d)return;
  document.getElementById('c4b-icon').innerHTML=`<i class="ti ${a.icon}" style="font-size:18px;"></i>`;
  document.getElementById('c4b-label').textContent=a.label+' · '+d.code;
  document.getElementById('c4b-nome').textContent=d.nome;
  document.title=d.nome+' · Quiz · nexor_med';
})();
document.getElementById('quiz-sub').textContent='Quiz 00'+qn+' · carregando...';

function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function shuffleQ(q){const idx=q.opts.map((o,i)=>({t:o,i}));shuffle(idx);return{q:q.q,opts:idx.map(x=>x.t),c:idx.findIndex(x=>x.i===q.c),exp:q.exp};}

let sq=[],cur=0,sel=-1,confirmed=false,rights=0,wrongs=0;
let TOTAL=50;
const keys=['A','B','C','D'];

async function loadQuiz(){
  const pad=qn.padStart(3,'0');
  const url=`content/quizzes/${area}/${dominio}/quiz_${pad}.json`;
  try{
    const res=await fetch(url);
    if(!res.ok) throw new Error('not found');
    const data=await res.json();
    TOTAL=data.total||data.questions.length;
    document.getElementById('quiz-sub').textContent='Quiz 00'+qn+' · '+TOTAL+' questões';
    const questions=data.questions;
    shuffle(questions);
    sq=questions.map(shuffleQ);
    startTimer();
    render();
  }catch(e){
    document.getElementById('q-label').textContent='conteúdo indisponível';
    document.getElementById('q-text').textContent='Não foi possível carregar este quiz no momento. Tente novamente mais tarde.';
    document.getElementById('btn-confirm').className='nx-btn-primary hidden';
    document.getElementById('timer-display').textContent='—';
  }
}
loadQuiz();

/* ── TIMER ── */
const TIMER_TOTAL = 60 * 60; // 60 minutos em segundos
let timerSec = TIMER_TOTAL;
let timerInterval = null;
let quizEnded = false;

function startTimer(){
  timerInterval = setInterval(() => {
    timerSec--;
    if(timerSec <= 0){ clearInterval(timerInterval); timerSec=0; updateTimerDisplay(); timeUp(); return; }
    updateTimerDisplay();
  }, 1000);
}

function updateTimerDisplay(){
  const el = document.getElementById('timer-display');
  const m = Math.floor(timerSec / 60);
  const s = timerSec % 60;
  el.textContent = String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
  if(timerSec <= 180){
    el.style.color = '#ef4444';
    el.style.animation = 'nx-pulse 1s ease-in-out infinite';
  } else if(timerSec <= 600){
    el.style.color = '#FCA311';
    el.style.animation = '';
  } else {
    el.style.color = '#FCA311';
    el.style.animation = '';
  }
}

function stopTimer(){
  clearInterval(timerInterval);
  timerInterval = null;
}

function timeUp(){
  if(quizEnded) return;
  quizEnded = true;
  TTS.stop && TTS.stop();
  document.getElementById('q-label').textContent = 'tempo esgotado';
  document.getElementById('q-text').textContent = 'O tempo da prova encerrou. Acertos: ' + rights + ' · Erros: ' + wrongs;
  document.getElementById('options').innerHTML = '';
  document.getElementById('btn-confirm').className = 'nx-btn-primary hidden';
  document.getElementById('btn-next').className = 'nx-btn-next hidden';
  document.getElementById('feedback').className = 'nx-feedback wrong';
  document.getElementById('fb-label').textContent = 'TEMPO ESGOTADO';
  document.getElementById('fb-text').textContent = 'Você respondeu ' + (rights+wrongs) + ' de ' + TOTAL + ' questões. Aproveitamento: ' + (rights+wrongs > 0 ? Math.round(rights/(rights+wrongs)*100) : 0) + '%.';
  document.getElementById('prog-fill').style.width = Math.round((rights+wrongs)/TOTAL*100) + '%';
  document.getElementById('sr').textContent = rights;
  document.getElementById('sw').textContent = wrongs;
  document.getElementById('sp').textContent = (rights+wrongs > 0 ? Math.round(rights/(rights+wrongs)*100) : 0) + '%';
  const timerEl = document.getElementById('timer-display');
  timerEl.textContent = '00:00';
  timerEl.style.color = '#ef4444';
  timerEl.style.animation = '';
  const btnVer2=document.createElement('a');
  btnVer2.href='c4c-scorecard#area='+area+'&dominio='+dominio+'&acertos='+rights+'&total='+(rights+wrongs)+'&modulo=quiz_'+qn;
  btnVer2.className='nx-btn-primary';
  btnVer2.style.cssText='text-decoration:none;margin-top:12px;';
  btnVer2.textContent='VER SCORECARD';
  document.getElementById('btn-next').insertAdjacentElement('afterend', btnVer2);
}

// Ao clicar em voltar: para timer, NÃO conta como tentativa
document.getElementById('btn-back').addEventListener('click', () => {
  stopTimer();
});

/* ── QUIZ ── */
function _doRender(){
  sel=-1;confirmed=false;
  const q=sq[cur];
  document.getElementById('q-label').textContent='questão '+String(cur+1).padStart(2,'0');
  document.getElementById('q-text').textContent=q.q;
  const opts=document.getElementById('options');
  opts.innerHTML='';
  q.opts.forEach((o,i)=>{
    const d=document.createElement('div');
    d.className='nx-option';
    d.innerHTML='<span class="nx-opt-key">'+keys[i]+'</span><span class="nx-opt-text">'+o+'</span>';
    d.onclick=()=>selectOpt(i);
    opts.appendChild(d);
  });
  document.getElementById('btn-confirm').disabled=true;
  document.getElementById('btn-confirm').className='nx-btn-primary';
  document.getElementById('feedback').className='nx-feedback';
  document.getElementById('btn-next').className='nx-btn-next hidden';
  document.getElementById('btn-aula').className='nx-btn-aula hidden';
  closeAula();
  document.getElementById('prog-fill').style.width=Math.max(2,Math.round(cur/TOTAL*100))+'%';
  document.getElementById('prog-count').textContent=(cur+1)+' / '+TOTAL;
  // enter animation
  const qtEl=document.getElementById('q-text');
  const opEl=document.getElementById('options');
  qtEl.classList.add('q-enter');
  opEl.classList.add('q-enter');
  requestAnimationFrame(()=>{
    requestAnimationFrame(()=>{
      qtEl.classList.remove('q-enter');
      opEl.classList.remove('q-enter');
    });
  });
}
function render(){
  if(cur===0){ _doRender(); return; }
  // exit animation then render
  const qtEl=document.getElementById('q-text');
  const opEl=document.getElementById('options');
  qtEl.classList.add('q-exit');
  opEl.classList.add('q-exit');
  setTimeout(()=>{
    qtEl.classList.remove('q-exit');
    opEl.classList.remove('q-exit');
    _doRender();
  }, 180);
}

function selectOpt(i){
  if(confirmed)return;
  sel=i;
  document.querySelectorAll('.nx-option').forEach((el,idx)=>el.className='nx-option'+(idx===i?' selected':''));
  document.getElementById('btn-confirm').disabled=false;
}

function confirm_answer(){
  if(sel<0||confirmed)return;
  confirmed=true;
  const q=sq[cur];
  const ok=sel===q.c;
  if(ok)rights++;else wrongs++;
  document.querySelectorAll('.nx-option').forEach((el,idx)=>{
    if(idx===q.c)el.className='nx-option correct';
    else if(idx===sel&&!ok)el.className='nx-option wrong';
    else el.className='nx-option dimmed';
  });
  const fb=document.getElementById('feedback');
  fb.className='nx-feedback '+(ok?'correct':'wrong');
  document.getElementById('fb-label').textContent=ok?'CORRETO':'INCORRETO';
  document.getElementById('btn-confirm').className='nx-btn-primary hidden';
  document.getElementById('btn-next').className='nx-btn-next';
  document.getElementById('btn-aula').className='nx-btn-aula';
  const tot=rights+wrongs;
  document.getElementById('sr').textContent=rights;
  document.getElementById('sw').textContent=wrongs;
  document.getElementById('sp').textContent=Math.round(rights/tot*100)+'%';
}

function nextQ(){
  cur++;
  if(cur>=sq.length){
    stopTimer();
    quizEnded=true;
    const pct=Math.round(rights/TOTAL*100);
    document.getElementById('q-label').textContent='quiz concluído';
    document.getElementById('q-text').textContent='Aproveitamento: '+pct+'% · Acertos: '+rights+' · Erros: '+wrongs;
    document.getElementById('options').innerHTML='';
    document.getElementById('btn-confirm').className='nx-btn-primary hidden';
    document.getElementById('btn-next').className='nx-btn-next hidden';
    document.getElementById('btn-aula').className='nx-btn-aula hidden';
    document.getElementById('feedback').className='nx-feedback';
    document.getElementById('prog-fill').style.width='100%';
    document.getElementById('prog-count').textContent=TOTAL+' / '+TOTAL;
    document.getElementById('sr').textContent=rights;
    document.getElementById('sw').textContent=wrongs;
    document.getElementById('sp').textContent=pct+'%';
    const btnVer=document.createElement('a');
    btnVer.href='c4c-scorecard#area='+area+'&dominio='+dominio+'&acertos='+rights+'&total='+(rights+wrongs)+'&modulo=quiz_'+qn;
    btnVer.className='nx-btn-primary';
    btnVer.style.cssText='text-decoration:none;margin-top:12px;';
    btnVer.textContent='VER SCORECARD';
    document.getElementById('btn-next').insertAdjacentElement('afterend', btnVer);
    return;
  }
  render();
}

/* render() e startTimer() são chamados dentro de loadQuiz() após o fetch */

/* ── MINI-AULA ── */
let resumosData = null;

async function loadResumos(){
  const pad = qn.padStart(3,'0');
  const url = `content/resumos/${area}/${dominio}/quiz_${pad}_resumos.json`;
  try {
    const res = await fetch(url);
    if(res.ok) resumosData = await res.json();
  } catch(e) { /* sem resumos disponíveis */ }
}
loadResumos();

function openAula(){
  const idx = cur; // índice 0-based da questão atual
  let texto = '';
  let fonte = '';
  if(resumosData && resumosData.resumos && resumosData.resumos[idx]){
    const r = resumosData.resumos[idx];
    texto = r.texto;
    fonte = r.fonte || '';
  } else {
    const q = sq[cur];
    texto = q.exp;
    fonte = 'Explicação do gabarito';
  }
  document.getElementById('aula-text').innerHTML = texto.split('\n\n').map(p =>
    `<p style="font-size:14px;font-family:'Barlow',sans-serif;font-weight:300;color:#E0E0E0;line-height:1.65;margin-bottom:14px;">${p}</p>`
  ).join('');
  document.getElementById('aula-fonte').textContent = fonte;
  const sheet = document.getElementById('nx-aula-sheet');
  const overlay = document.getElementById('nx-aula-overlay');
  sheet.classList.add('open');
  overlay.style.opacity = '1';
  overlay.style.pointerEvents = 'auto';
}

function closeAula(){
  const sheet = document.getElementById('nx-aula-sheet');
  const overlay = document.getElementById('nx-aula-overlay');
  if(!sheet) return;
  sheet.classList.remove('open');
  overlay.style.opacity = '0';
  overlay.style.pointerEvents = 'none';
}

function ttsAula(btn){
  const texto = document.getElementById('aula-text').innerText + '. Fonte: ' + document.getElementById('aula-fonte').textContent;
  TTS.speak(texto, btn);
}

function ttsQuestao(btn){
  const q=sq[cur];
  const opts=['A','B','C','D'];
  const texto=q.q+'. '+q.opts.map((o,i)=>opts[i]+': '+o).join('. ');
  TTS.speak(texto, btn);
}


// motion init
(function(){
  const scrollEl = document.querySelector('.nx-scroll');
  requestAnimationFrame(()=>{
    requestAnimationFrame(()=>{
      document.querySelectorAll('.hero-reveal').forEach(el=>el.classList.add('visible'));
    });
  });
  const io = new IntersectionObserver((entries)=>{
    entries.forEach(entry=>{
      if(entry.isIntersecting){entry.target.classList.add('visible');io.unobserve(entry.target);}
    });
  },{root:scrollEl,threshold:0.08});
  document.querySelectorAll('.sr').forEach(el=>io.observe(el));
})();
</script>
<style>
.hero-reveal{opacity:0;transform:translateY(20px);filter:blur(6px);transition:opacity 700ms cubic-bezier(0.16,1,0.3,1),transform 700ms cubic-bezier(0.16,1,0.3,1),filter 700ms cubic-bezier(0.16,1,0.3,1);}
.hero-reveal.visible{opacity:1;transform:translateY(0);filter:blur(0);}
.sr{opacity:0;transform:translateY(15px);transition:opacity 600ms cubic-bezier(0.16,1,0.3,1),transform 600ms cubic-bezier(0.16,1,0.3,1);}
.sr.visible{opacity:1;transform:translateY(0);}
/* Quiz motion */
#q-text,#options{transition:opacity 280ms cubic-bezier(0.16,1,0.3,1),transform 280ms cubic-bezier(0.16,1,0.3,1);}
.q-exit{opacity:0!important;transform:translateY(-10px)!important;}
.q-enter{opacity:0;transform:translateY(12px);}
.nx-feedback{transform:translateY(8px);opacity:0;transition:opacity 320ms cubic-bezier(0.16,1,0.3,1),transform 320ms cubic-bezier(0.16,1,0.3,1);}
.nx-feedback.correct,.nx-feedback.wrong{opacity:1;transform:translateY(0);}
.nx-btn-primary{transition:transform 120ms cubic-bezier(0.16,1,0.3,1),box-shadow 200ms ease,background 150ms ease;}
.nx-btn-primary:active{transform:scale(0.97)!important;}
@keyframes nx-pulse{0%,100%{opacity:1;}50%{opacity:0.4;}}
@media(prefers-reduced-motion:reduce){#q-text,#options,.nx-feedback{transition:none!important;opacity:1!important;transform:none!important;}}
</style>
</body>
</html>
