.hero-reveal{opacity:0;transform:translateY(20px);filter:blur(6px);transition:opacity 700ms cubic-bezier(0.16,1,0.3,1),transform 700ms cubic-bezier(0.16,1,0.3,1),filter 700ms cubic-bezier(0.16,1,0.3,1);}
.hero-reveal.visible{opacity:1;transform:translateY(0);filter:blur(0);}

.nx-capsule{transition:transform 250ms cubic-bezier(0.16,1,0.3,1),box-shadow 250ms ease,border-color 250ms ease;}
@media(hover:hover){.nx-capsule:hover{transform:translateY(-3px) scale(1.012)!important;box-shadow:0 8px 24px rgba(0,0,0,0.35)!important;border-color:rgba(159,203,235,0.3)!important;}}
@media(prefers-reduced-motion:reduce){.hero-reveal,.sr{opacity:1!important;transform:none!important;filter:none!important;}}

@media(min-width:768px){
  body{width:100%!important;}
  .nx-scroll{width:100%!important;}
  .nx-body{width:100%!important;max-width:900px!important;margin:0 auto!important;padding:48px 32px 48px!important;}
  .nx-header{padding:0 32px!important;}
  #lista-modulos{display:grid!important;grid-template-columns:1fr 1fr!important;gap:12px!important;}

  body{width:100%!important;}
  .nx-body{max-width:1000px!important;padding:48px 48px 64px!important;}

<body>
<div class="nx-header">
  <a id="btn-back" href="c2-med" class="nx-back-btn"><i class="ti ti-arrow-left"></i>voltar</a>
  <div class="nx-wordmark">nexor_<span>med</span></div>
  <button class="nx-bell-btn" id="nx-bell-btn" onclick="toggleNotif()"><i class="ti ti-bell"></i></button>
  <a href="#" class="nx-avatar-btn" onclick="toggleProfile();return false;">AA</a>
</div>
<div class="nx-scroll">
<div class="nx-body">
  <div id="dominio-header" class="hero-reveal"></div>
  <div class="nx-section-label">módulos</div>
  <div id="lista-modulos"></div>
</div>
</div>
<div class="nx-footer"><span>nexor_med · Residência Médica · Powered by FractalLearning™</span></div>
<script src="assets/notif.js"></script>
<script src="assets/profile.js"></script>
<script src="assets/catalog.js"></script>
<script>
// Protege a rota — redireciona para login se não autenticado
(async () => {
  const s = await Auth.requireAuth();
  if (!s) return;
  if (!await Auth.requireAccess()) return;
  await Auth.fillHeader();
})();
</script>
<script>
const hash = Object.fromEntries(window.location.hash.replace('#','').split('&').map(p=>p.split('=')));
const sp = new URLSearchParams(window.location.search);
const areaSlug = hash.area || sp.get('area') || 'cirurgia_geral';
const dominioSlug = hash.dominio || sp.get('dominio') || 'abdome_agudo';
const area = CATALOG[areaSlug];
const dominio = area && area.dominios.find(d => d.slug === dominioSlug);

document.getElementById('btn-back').href = 'c2-med#area=' + areaSlug;

if (!dominio) {
  document.getElementById('dominio-header').innerHTML = '<p style="color:#ef4444;padding:20px;">Domínio não encontrado.</p>';
} else {
  document.title = dominio.nome + ' · nexor_med';

  document.getElementById('dominio-header').innerHTML = `
    <div style="display:flex;align-items:center;gap:14px;margin-bottom:20px;">
      <div class="nx-icon-slot" style="width:52px;height:52px;flex-shrink:0;"><i class="ti ${area.icon}" style="font-size:22px;"></i></div>
      <div>
        <div style="font-size:11px;font-family:'Barlow',sans-serif;font-weight:300;color:#0EA5E9;margin-bottom:3px;">${area.label} · ${dominio.code}</div>
        <div style="font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:18px;color:#F0F6FB;line-height:1.1;">${dominio.nome}</div>
        <div style="font-size:12px;color:#B0BEC5;font-weight:300;margin-top:2px;">${area.label} — ${dominio.code}</div>
      </div>
    </div>`;

  const p = `area=${areaSlug}&dominio=${dominioSlug}`;
  document.getElementById('lista-modulos').innerHTML = `
    <a href="c4a-flashcard#${p}" class="nx-capsule active sr" style="transition-delay:0ms">
      <div class="nx-icon-slot sm"><i class="ti ti-cards"></i></div>
      <div class="nx-cap-body">
        <div class="nx-cap-title">Flashcards</div>
        <div class="nx-cap-sub" id="sub-fc">48 cards · F1–F4 FractalLearning™</div>
      </div>
      <div class="nx-pill available" id="pill-fc">ESTUDAR</div>
    </a>
    <a href="c4b-quiz#${p}&n=1" class="nx-capsule active sr" style="transition-delay:60ms">
      <div class="nx-icon-slot sm"><i class="ti ti-clipboard-check"></i></div>
      <div class="nx-cap-body">
        <div class="nx-cap-title">Quiz 001</div>
        <div class="nx-cap-sub" id="sub-q1">50 questões</div>
      </div>
      <div class="nx-pill available" id="pill-q1">INICIAR</div>
    </a>
    <a href="c4b-quiz#${p}&n=2" class="nx-capsule active sr" style="transition-delay:120ms">
      <div class="nx-icon-slot sm"><i class="ti ti-clipboard-check"></i></div>
      <div class="nx-cap-body">
        <div class="nx-cap-title">Quiz 002</div>
        <div class="nx-cap-sub" id="sub-q2">50 questões</div>
      </div>
      <div class="nx-pill available" id="pill-q2">INICIAR</div>
    </a>
    <a href="c4c-scorecard#${p}" class="nx-capsule active sr" style="transition-delay:180ms">
      <div class="nx-icon-slot sm"><i class="ti ti-chart-bar"></i></div>
      <div class="nx-cap-body">
        <div class="nx-cap-title">Scorecard</div>
        <div class="nx-cap-sub" id="sub-sc">Histórico de tentativas</div>
      </div>
      <div class="nx-pill available" id="pill-sc">VER</div>
    </a>`;

  // Status de desempenho por módulo
  (async () => {
    try {
      const {data:{session}} = await _sb.auth.getSession();
      if (!session) return;
      const {data:sessions} = await _sb.from('study_sessions')
        .select('modulo,tipo,score,acertos,total')
        .eq('user_id', session.user.id)
        .eq('area', areaSlug)
        .eq('dominio', dominioSlug);
      if (!sessions || !sessions.length) return;

      function pillScore(best) {
        if (best >= 80) return { label: best+'%', color:'#4ade80', bg:'rgba(74,222,128,0.1)', bd:'rgba(74,222,128,0.3)', sz:'11px' };
        if (best >= 50) return { label: best+'%', color:'#FCA311', bg:'rgba(252,163,17,0.1)',  bd:'rgba(252,163,17,0.3)',  sz:'11px' };
        return               { label: best+'%', color:'#ef4444', bg:'rgba(239,68,68,0.1)',   bd:'rgba(239,68,68,0.3)',   sz:'11px' };
      }
      function pillStatus(best) {
        if (best >= 80) return { label:'SATISFATÓRIO', color:'#4ade80', bg:'rgba(74,222,128,0.1)', bd:'rgba(74,222,128,0.3)', sz:'9px' };
        if (best >= 50) return { label:'MEDIANO',      color:'#FCA311', bg:'rgba(252,163,17,0.1)',  bd:'rgba(252,163,17,0.3)',  sz:'9px' };
        return               { label:'INSUFICIENTE',  color:'#ef4444', bg:'rgba(239,68,68,0.1)',   bd:'rgba(239,68,68,0.3)',   sz:'9px' };
      }
      function applyPill(id, p) {
        const el = document.getElementById(id);
        if (el) { el.textContent = p.label; el.style.cssText = `background:${p.bg};color:${p.color};border:1px solid ${p.bd};font-size:${p.sz};font-weight:600;`; }
      }
      function bestFor(mod) {
        const s = sessions.filter(s => s.modulo === mod && s.tipo === 'quiz');
        return s.length ? Math.max(...s.map(s => parseFloat(s.score) || 0)) : null;
      }

      // Flashcards
      const fcSessions = sessions.filter(s => s.tipo === 'flashcard');
      if (fcSessions.length > 0) {
        applyPill('pill-fc', { label:'FEITO', color:'#4ade80', bg:'rgba(74,222,128,0.1)', bd:'rgba(74,222,128,0.3)', sz:'10px' });
        const sub = document.getElementById('sub-fc');
        if (sub) sub.textContent = `concluído ${fcSessions.length}× · última sessão`;
      }

      // Quiz 001
      const b1 = bestFor('quiz_1');
      if (b1 !== null) {
        applyPill('pill-q1', pillScore(b1));
        const sub = document.getElementById('sub-q1');
        const st = pillStatus(b1);
        if (sub) sub.textContent = '50 questões';
      }

      // Quiz 002
      const b2 = bestFor('quiz_2');
      if (b2 !== null) {
        applyPill('pill-q2', pillScore(b2));
        const sub = document.getElementById('sub-q2');
        if (sub) sub.textContent = '50 questões';
      }

      // Scorecard — melhor score geral entre todos os quizzes
      const quizScores = sessions.filter(s => s.tipo === 'quiz').map(s => parseFloat(s.score) || 0);
      if (quizScores.length) {
        const bestAll = Math.max(...quizScores);
        applyPill('pill-sc', pillStatus(bestAll));
        const sub = document.getElementById('sub-sc');
        if (sub) sub.textContent = `${quizScores.length} tentativa${quizScores.length > 1 ? 's' : ''} · melhor: ${bestAll}%`;
      }
    } catch(e) { console.warn('Erro ao carregar status C3:', e); }
  })();

  (function(){
    const scrollEl = document.querySelector('.nx-scroll');
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        const dh = document.getElementById('dominio-header');
        if (dh) dh.classList.add('visible');
      });
    });
    const io = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) { entry.target.classList.add('visible'); io.unobserve(entry.target); }
      });
    }, { root: scrollEl, threshold: 0.08 });
    document.querySelectorAll('.sr').forEach(el => io.observe(el));
  })();
}
</script>
<script>if("serviceWorker"in navigator)navigator.serviceWorker.register("sw.js");</script>
</body>
</html>
